name: Spectrum Image

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/spectrum.yaml
      - .dockerignore
      - pyproject.toml
      - spectrum/**
      - uv.lock
  push:
    branches:
      - master
    paths:
      - .github/workflows/spectrum.yaml
      - .dockerignore
      - pyproject.toml
      - spectrum/**
      - uv.lock
  schedule:
    - cron: "42 4 * * *"
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read # needed to checkout repository contents

env:
  BLUEFIN_BASE_IMAGE: ghcr.io/ublue-os/bluefin-nvidia-open:stable@sha256:1e7a59c83f104652bd06308f0a6439669cb3ea327d4e968695af85c67abea352
  BLUEFIN_BASE_IMAGE_NAME: bluefin-nvidia-open
  BLUEFIN_BASE_IMAGE_TAG: stable
  IMAGE_NAME: spectrum

jobs:
  build:
    name: Build Bluefin Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read # needed to checkout repository contents
      packages: write # needed to push images to GitHub Container Registry
      id-token: write # needed for keyless cosign signing
      attestations: write # needed to publish GitHub provenance attestations
      artifact-metadata: write # needed to link attestations to the published image
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free Runner Space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          sudo docker system prune --all --force || true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y podman skopeo

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify Bluefin Base Image
        env:
          BLUEFIN_BASE_IMAGE: ${{ env.BLUEFIN_BASE_IMAGE }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity=https://github.com/ublue-os/bluefin/.github/workflows/reusable-build.yml@refs/heads/main \
            "${BLUEFIN_BASE_IMAGE}"

      - name: Prepare Image Metadata
        id: image
        env:
          IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
        run: |
          set -euo pipefail
          image_registry="${IMAGE_REGISTRY,,}"
          image_name="${IMAGE_NAME,,}"
          image_vendor="${GITHUB_REPOSITORY_OWNER,,}"
          revision="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          date_tag="$(date -u +%Y%m%d)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="${date_tag}-${short_sha}"
          repository_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          raw_repository_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}"

          {
            echo "image_ref=${image_registry}/${image_name}"
            echo "image_vendor=${image_vendor}"
            echo "local_ref=${image_name}:latest"
            echo "created=${created}"
            echo "revision=${revision}"
            echo "version=${version}"
            echo "source=${repository_url}/blob/${revision}/spectrum/Containerfile"
            echo "url=${repository_url}/tree/${revision}"
            echo "documentation=${raw_repository_url}/${revision}/README.md"
            echo "readme=${raw_repository_url}/${revision}/README.md"
            echo "tags<<EOF"
            echo "latest"
            echo "${date_tag}"
            echo "${version}"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Build Bluefin Image
        env:
          BLUEFIN_BASE_IMAGE: ${{ env.BLUEFIN_BASE_IMAGE }}
          BLUEFIN_BASE_IMAGE_NAME: ${{ env.BLUEFIN_BASE_IMAGE_NAME }}
          BLUEFIN_BASE_IMAGE_TAG: ${{ env.BLUEFIN_BASE_IMAGE_TAG }}
          CREATED: "${{ steps.image.outputs.created }}"
          GITHUB_TOKEN: ${{ github.token }}
          IMAGE_REF: "${{ steps.image.outputs.image_ref }}"
          IMAGE_VENDOR: "${{ steps.image.outputs.image_vendor }}"
          LOCAL_REF: "${{ steps.image.outputs.local_ref }}"
          REVISION: "${{ steps.image.outputs.revision }}"
          VERSION: "${{ steps.image.outputs.version }}"
          SOURCE: "${{ steps.image.outputs.source }}"
          URL: "${{ steps.image.outputs.url }}"
          DOCUMENTATION: "${{ steps.image.outputs.documentation }}"
          README: "${{ steps.image.outputs.readme }}"
        run: |
          github_token_file=$(mktemp)
          trap 'rm -f "${github_token_file}"' EXIT
          printf '%s' "${GITHUB_TOKEN}" >"${github_token_file}"
          chmod 600 "${github_token_file}"
          base_image_ref="${BLUEFIN_BASE_IMAGE%@*}"
          base_image_digest="${BLUEFIN_BASE_IMAGE##*@}"
          if [[ "${base_image_digest}" == "${BLUEFIN_BASE_IMAGE}" ]]; then
            printf '%s\n' 'BLUEFIN_BASE_IMAGE must be pinned by digest' >&2
            exit 1
          fi

          sudo podman build \
            --pull=newer \
            --secret "id=github_token,src=${github_token_file}" \
            --tag "${LOCAL_REF}" \
            --build-arg "BLUEFIN_BASE_IMAGE=${BLUEFIN_BASE_IMAGE}" \
            --build-arg "BLUEFIN_BASE_IMAGE_NAME=${BLUEFIN_BASE_IMAGE_NAME}" \
            --build-arg "BLUEFIN_BASE_IMAGE_TAG=${BLUEFIN_BASE_IMAGE_TAG}" \
            --build-arg "IMAGE_NAME=${IMAGE_NAME,,}" \
            --build-arg "IMAGE_VENDOR=${IMAGE_VENDOR}" \
            --build-arg "IMAGE_TAG=latest" \
            --build-arg "IMAGE_REF=ostree-image:docker://${IMAGE_REF}" \
            --build-arg "IMAGE_CREATED=${CREATED}" \
            --build-arg "IMAGE_REVISION=${REVISION}" \
            --build-arg "IMAGE_VERSION=${VERSION}" \
            --build-arg "IMAGE_SOURCE=${SOURCE}" \
            --build-arg "IMAGE_URL=${URL}" \
            --build-arg "IMAGE_DOCUMENTATION=${DOCUMENTATION}" \
            --build-arg "IMAGE_README=${README}" \
            --label "org.opencontainers.image.base.name=${base_image_ref}" \
            --label "org.opencontainers.image.base.digest=${base_image_digest}" \
            --file spectrum/Containerfile \
            .

      - name: Validate OCI Metadata
        env:
          BLUEFIN_BASE_IMAGE: ${{ env.BLUEFIN_BASE_IMAGE }}
          EXPECTED_DOCUMENTATION: "${{ steps.image.outputs.documentation }}"
          EXPECTED_README: "${{ steps.image.outputs.readme }}"
          EXPECTED_REVISION: "${{ steps.image.outputs.revision }}"
          EXPECTED_SOURCE: "${{ steps.image.outputs.source }}"
          EXPECTED_URL: "${{ steps.image.outputs.url }}"
          EXPECTED_VERSION: "${{ steps.image.outputs.version }}"
          LOCAL_REF: "${{ steps.image.outputs.local_ref }}"
        run: |
          set -euo pipefail
          base_image_ref="${BLUEFIN_BASE_IMAGE%@*}"
          base_image_digest="${BLUEFIN_BASE_IMAGE##*@}"
          sudo podman image inspect "${LOCAL_REF}" \
            | jq -e \
              --arg base_digest "${base_image_digest}" \
              --arg base_ref "${base_image_ref}" \
              --arg documentation "${EXPECTED_DOCUMENTATION}" \
              --arg readme "${EXPECTED_README}" \
              --arg revision "${EXPECTED_REVISION}" \
              --arg source "${EXPECTED_SOURCE}" \
              --arg url "${EXPECTED_URL}" \
              --arg version "${EXPECTED_VERSION}" \
              '.[0].Config.Labels as $labels
              | $labels["containers.bootc"] == "1"
                and $labels["org.opencontainers.image.authors"] == "4evy <git@evy.pink>"
                and $labels["org.opencontainers.image.base.digest"] == $base_digest
                and $labels["org.opencontainers.image.base.name"] == $base_ref
                and $labels["org.opencontainers.image.documentation"] == $documentation
                and $labels["org.opencontainers.image.license"] == "MIT"
                and $labels["org.opencontainers.image.licenses"] == "MIT"
                and $labels["org.opencontainers.image.revision"] == $revision
                and $labels["org.opencontainers.image.source"] == $source
                and $labels["org.opencontainers.image.url"] == $url
                and $labels["org.opencontainers.image.version"] == $version
                and $labels["io.artifacthub.package.logo-url"] == "https://avatars.githubusercontent.com/u/57304299?v=4"
                and $labels["io.artifacthub.package.readme-url"] == $readme
                and ($labels["io.artifacthub.package.maintainers"] | fromjson | .[0])
                  == {"name": "4evy", "email": "git@evy.pink"}'

      - name: Report Boot Artifacts
        env:
          LOCAL_REF: "${{ steps.image.outputs.local_ref }}"
        run: |
          sudo podman run \
            --rm \
            --entrypoint bash \
            --volume "$PWD:/workspace:ro" \
            "${LOCAL_REF}" \
            -ceu '
              mkdir -p /tmp/spectrum-workspace/ansible/files/scripts
              mkdir -p /tmp/spectrum-workspace/spectrum
              cp /workspace/pyproject.toml /workspace/uv.lock /tmp/spectrum-workspace/
              cp -a /workspace/ansible/files/scripts/workstation \
                /tmp/spectrum-workspace/ansible/files/scripts/
              cp -a /workspace/spectrum/scripts /tmp/spectrum-workspace/spectrum/
              UV_PROJECT_ENVIRONMENT=/tmp/spectrum-boot-report-venv \
                uv --cache-dir /tmp/spectrum-uv-cache \
                  --directory /tmp/spectrum-workspace \
                  run --locked python /tmp/spectrum-workspace/spectrum/scripts/boot_artifacts.py
            '

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          printf '%s' "${GHCR_PASSWORD}" \
            | sudo podman login ghcr.io \
                --username "${GHCR_USERNAME}" \
                --password-stdin

      - name: Push Image
        id: push
        if: github.event_name != 'pull_request'
        env:
          IMAGE_REF: "${{ steps.image.outputs.image_ref }}"
          LOCAL_REF: "${{ steps.image.outputs.local_ref }}"
          TAGS: "${{ steps.image.outputs.tags }}"
        run: |
          set -euo pipefail
          # sudo podman writes the digest file, so create and clean it as root too.
          digest_file=$(sudo mktemp)
          trap 'sudo rm -f "$digest_file"' EXIT

          pushed_default=false
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            sudo podman tag "${LOCAL_REF}" "${IMAGE_REF}:${tag}"
            if [ "$pushed_default" = false ]; then
              sudo podman push --digestfile "$digest_file" "${IMAGE_REF}:${tag}"
              pushed_default=true
            else
              sudo podman push "${IMAGE_REF}:${tag}"
            fi
          done <<<"${TAGS}"

          digest=$(sudo cat "$digest_file")
          echo "digest=${digest}" >>"$GITHUB_OUTPUT"

      - name: Download Syft
        id: syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.42.3

      - name: Generate SPDX SBOM
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_REF: "${{ steps.image.outputs.image_ref }}"
          LOCAL_REF: "${{ steps.image.outputs.local_ref }}"
          SYFT_CMD: "${{ steps.syft.outputs.cmd }}"
          SYFT_FILE_METADATA_SELECTION: none
        run: |
          set -euo pipefail
          mount_path=$(sudo podman image mount "${LOCAL_REF}")
          trap 'sudo podman image unmount "${LOCAL_REF}" >/dev/null' EXIT
          sudo "${SYFT_CMD}" scan \
            "dir:${mount_path}" \
            --source-name "${IMAGE_REF}@${DIGEST}" \
            --output spdx-json=spectrum.spdx.json

      - name: Upload SPDX SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spectrum.spdx.json
          path: spectrum.spdx.json
          if-no-files-found: error

      - name: Sign Image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          IMAGE_REF: "${{ steps.image.outputs.image_ref }}"
        run: |
          printf '%s' "${GHCR_PASSWORD}" \
            | cosign login ghcr.io \
                --username "${GHCR_USERNAME}" \
                --password-stdin
          cosign sign --yes "${IMAGE_REF}@${DIGEST}"

      - name: Attest Image
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.image_ref }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest Image SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.image_ref }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: spectrum.spdx.json
          push-to-registry: true
