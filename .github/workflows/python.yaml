name: Python

on:
  pull_request: null
  push: null
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read # needed to checkout repository contents

jobs:
  quality:
    name: Astral Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to checkout repository contents
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.28"
          python-version: "3.14"
          enable-cache: true

      - name: Verify Locked Environment
        env:
          UV_MALWARE_CHECK: "1"
        run: |
          uv lock --check
          uv sync --locked

      - name: Check Ruff Formatting
        run: uv run --locked ruff format --check .

      - name: Run Ruff
        run: uv run --locked ruff check --output-format github .

      - name: Check Cognitive Complexity
        run: |
          mapfile -d '' -t python_files < <(git ls-files -co --exclude-standard -z -- '*.py')
          ((${#python_files[@]} == 0)) || uv run --locked complexipy --failed --plain "${python_files[@]}"

      - name: Run ty
        run: uv run --locked ty check --output-format github

      - name: Check Python Dependencies
        run: uv run --locked deptry . --github-output

      - name: Find Dead Python Code
        run: |
          mapfile -d '' -t python_files < <(git ls-files -co --exclude-standard -z -- '*.py')
          ((${#python_files[@]} == 0)) || uv run --locked vulture "${python_files[@]}"

      - name: Compile Python Sources
        run: uv run --locked python -m compileall -q ansible/files/scripts dotfiles/.chezmoiscripts internal/chromiumbrowser/scripts packages/toshy spectrum/scripts

      - name: Test
        run: uv run --locked pytest

      - name: Build Package
        run: uv build --no-build-logs
