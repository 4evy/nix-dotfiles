name: Bun

on:
  pull_request:
    paths:
      - .github/workflows/bun.yaml
      - bun.lock
      - package.json
      - packages/hyper-window-tiling/**
  push:
    paths:
      - .github/workflows/bun.yaml
      - bun.lock
      - package.json
      - packages/hyper-window-tiling/**
  workflow_dispatch: null

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read # needed to checkout repository contents

jobs:
  package:
    name: Check ${{ matrix.package }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed to checkout repository contents
    strategy:
      fail-fast: false
      matrix:
        package:
          - hyper-window-tiling
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install Dependencies
        run: bun install --frozen-lockfile --filter ${{ matrix.package }}

      - name: Check Package
        run: bun run --filter ${{ matrix.package }} check
