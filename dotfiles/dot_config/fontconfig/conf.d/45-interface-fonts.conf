<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>system-ui</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>ui-sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Adwaita Sans</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Cantarell</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Roboto</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Helvetica Neue</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Helvetica</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Arial</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Google Sans</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Google Sans Text</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family">
          <string>Google Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Google Sans Text</string>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>Google Sans</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>Google Sans Text</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>Open Sans</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>ui-sans-serif</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>Adwaita Sans</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq" qual="first">
      <string>Cantarell</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>
</fontconfig>
