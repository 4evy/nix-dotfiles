[[language]]
name = "python"
auto-format = true
language-servers = ["ruff"]

[[language]]
name = "bash"
file-types = [
  "sh",
  "bash",
  "zsh",
  { glob = "*.sh.tmpl" },
  { glob = "*.bash.tmpl" },
  { glob = "*.zsh.tmpl" },
  { glob = "dot_bash_profile.tmpl" },
  { glob = "dot_bashenv.tmpl" },
  { glob = "dot_bashrc.tmpl" },
  { glob = "dot_zshenv.tmpl" },
  { glob = "dot_zshrc.tmpl" },
]
auto-format = true
diagnostic-severity = "warning"
formatter = { command = "shfmt", args = ["-i", "2", "-bn"] }
language-servers = ["bash-language-server"]

[[language]]
name = "javascript"
auto-format = true
indent = { tab-width = 4, unit = "    " }
language-servers = ["typescript-language-server"]

[[language]]
name = "css"
auto-format = true
language-servers = ["vscode-css-language-server"]

[[language]]
name = "json"
file-types = ["json", "jsonc", { glob = "*.json.tmpl" }]
auto-format = true
indent = { tab-width = 2, unit = "  " }
language-servers = ["vscode-json-language-server"]

[[language]]
name = "yaml"
file-types = ["yaml", "yml", { glob = "*.yaml.tmpl" }, { glob = "*.yml.tmpl" }]
auto-format = true
language-servers = ["yaml-language-server"]

[[language]]
name = "toml"
file-types = [
  "toml",
  { glob = "*.toml.tmpl" },
  { glob = ".chezmoiexternal.toml.tmpl" },
]
auto-format = true
language-servers = ["taplo"]

[[language]]
name = "nix"
auto-format = true
formatter = { command = "nixfmt" }
language-servers = ["nil"]

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

[language-server.ruff]
command = "ruff"
args = ["server", "--preview"]
[language-server.ruff.config]
lineLength = 100
[language-server.ruff.config.lint]
extendSelect = ["I"]

[language-server.typescript-language-server]
command = "bunx"
args = [
  "--bun",
  "-p",
  "typescript-language-server",
  "typescript-language-server",
  "--stdio",
]
[language-server.typescript-language-server.config]
hostInfo = "helix"

[language-server.vscode-css-language-server]
command = "bunx"
args = [
  "--bun",
  "-p",
  "vscode-langservers-extracted",
  "vscode-css-language-server",
  "--stdio",
]

[language-server.vscode-json-language-server]
command = "bunx"
args = [
  "--bun",
  "-p",
  "vscode-langservers-extracted",
  "vscode-json-language-server",
  "--stdio",
]

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]
[language-server.yaml-language-server.config.yaml]
format = { enable = true }
validation = true
schemas = { https = true }

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]
[language-server.taplo.config.formatter]
alignEntries = true
columnWidth = 100

[language-server.nil]
command = "nil"

[language-server.just-lsp]
command = "just-lsp"
