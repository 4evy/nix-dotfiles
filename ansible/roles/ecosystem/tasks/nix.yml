---
- name: Detect Nix
  ansible.builtin.command:
    argv:
      - /bin/sh
      - -c
      - command -v "$1"
      - dotfiles-nix-command
      - nix
  changed_when: false
  failed_when: false
  check_mode: false
  environment:
    PATH: "{{ ecosystem_nix_path }}"
  register: ecosystem_nix_command
  tags:
    - ecosystem
    - nix

- name: Check Nix root mountpoint
  ansible.builtin.stat:
    path: /nix
  register: ecosystem_nix_root
  when: common_has_rpm_ostree
  tags:
    - ecosystem
    - nix

- name: Gather root filesystem mount facts
  ansible.builtin.mount_facts:
    sources:
      - dynamic
    timeout: 10
  when:
    - common_has_rpm_ostree
    - ecosystem_nix_command.rc != 0
  tags:
    - ecosystem
    - nix

- name: Require Nix mountpoint on composefs ostree hosts
  ansible.builtin.fail:
    msg: >-
      This ostree host uses composefs, so /nix must exist in the booted image
      before Determinate Nix can bind-mount it. Rebuild and boot the Spectrum
      image that includes the /nix mountpoint, then rerun this playbook without
      sudo after pre-authenticating with sudo -v.
  when:
    - common_has_rpm_ostree
    - ecosystem_nix_command.rc != 0
    - ansible_facts.mount_points.get('/', {}).get('fstype', '') == 'composefs'
    - not ecosystem_nix_root.stat.exists | default(false)
  tags:
    - ecosystem
    - nix

- name: Detect system-runner sudo access for Nix install
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - "{{ dotfiles_bin_dir }}/system-runner"
      - id
      - -u
  changed_when: false
  failed_when: false
  register: ecosystem_nix_system_runner_sudo
  when:
    - common_is_linux
    - ecosystem_nix_command.rc != 0
  tags:
    - ecosystem
    - nix

- name: Require system-runner sudo access for Nix install
  ansible.builtin.fail:
    msg: >-
      Installing Determinate Nix requires passwordless sudo access to
      {{ dotfiles_bin_dir }}/system-runner. Run the bootstrap/setup path that
      installs the system-runner sudoers entry, then rerun this playbook as your
      normal user.
  when:
    - common_is_linux
    - ecosystem_nix_command.rc != 0
    - ecosystem_nix_system_runner_sudo.rc | default(1) != 0
  tags:
    - ecosystem
    - nix

- name: Ensure Nix installer cache directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_cache_dir }}/installers"
    state: directory
    mode: "0755"
  when: ecosystem_nix_command.rc != 0
  tags:
    - ecosystem
    - nix

- name: Download Nix installer
  ansible.builtin.get_url:
    url: "{{ ecosystem_nix_installer_url }}"
    dest: "{{ dotfiles_cache_dir }}/installers/nix-installer.sh"
    checksum: "{{ ecosystem_nix_installer_checksum | default(omit) }}"
    mode: "0755"
  when: ecosystem_nix_command.rc != 0
  tags:
    - ecosystem
    - nix

- name: Install Determinate Nix on Linux
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - "{{ dotfiles_bin_dir }}/system-runner"
      - --env
      - NIX_INSTALLER_NO_CONFIRM=true
      - --
      - /bin/sh
      - "{{ dotfiles_cache_dir }}/installers/nix-installer.sh"
      - install
      - "{{ 'ostree' if common_has_rpm_ostree else 'linux' }}"
      - --no-confirm
      - --no-modify-profile
  args:
    creates: "{{ ecosystem_nix_bin }}"
  when:
    - common_is_linux
    - ecosystem_nix_command.rc != 0
  tags:
    - ecosystem
    - nix

- name: Install upstream Nix with the NixOS installer on macOS
  ansible.builtin.command:
    argv:
      - /bin/sh
      - "{{ dotfiles_cache_dir }}/installers/nix-installer.sh"
      - install
      - macos
      - --enable-flakes
      - --no-confirm
      - --no-modify-profile
  args:
    creates: "{{ ecosystem_nix_bin }}"
  become: true
  when:
    - common_is_macos
    - ecosystem_nix_command.rc != 0
  tags:
    - ecosystem
    - nix

- name: Check default Nix binary
  ansible.builtin.stat:
    path: "{{ ecosystem_nix_bin }}"
  register: ecosystem_nix_default_bin
  tags:
    - ecosystem
    - nix

- name: Select Nix binary
  ansible.builtin.set_fact:
    ecosystem_nix_command_bin: >-
      {{
        ecosystem_nix_bin
        if ecosystem_nix_default_bin.stat.executable | default(false)
        else 'nix'
      }}
  tags:
    - ecosystem
    - nix

- name: Detect Nix profile tools
  ansible.builtin.command:
    argv:
      - /bin/sh
      - -c
      - |
        command -v "$1" >/dev/null 2>&1 \
          || test -e "$2" \
          || test -e "$3"
      - dotfiles-nix-profile-tool
      - "{{ item.bin }}"
      - "{{ dotfiles_home_dir }}/.nix-profile/bin/{{ item.bin }}"
      - "/run/current-system/sw/bin/{{ item.bin }}"
  changed_when: false
  failed_when: false
  check_mode: false
  environment:
    PATH: "{{ ecosystem_nix_path }}"
  register: ecosystem_nix_profile_tool_commands
  loop: "{{ ecosystem_nix_profile_packages }}"
  loop_control:
    label: "{{ item.bin }}"
  tags:
    - ecosystem
    - nix

- name: Install Nix profile tools
  ansible.builtin.command:
    argv:
      - "{{ ecosystem_nix_command_bin }}"
      - profile
      - install
      - "{{ item.item.source | default('nixpkgs#' ~ item.item.package) }}"
  environment:
    PATH: "{{ ecosystem_nix_path }}"
  changed_when: true
  loop: >-
    {{
      ecosystem_nix_profile_tool_commands.results
      | selectattr('rc', 'ne', 0)
      | list
    }}
  loop_control:
    label: "{{ item.item.package }}"
  tags:
    - ecosystem
    - nix
