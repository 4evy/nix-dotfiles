---
- name: Install Linux bootstrap packages before Homebrew
  ansible.builtin.import_tasks: packages.yml
  when: common_is_linux
  tags:
    - bootstrap
    - packages

- name: Install Homebrew and modern Bash first
  ansible.builtin.import_tasks: homebrew.yml
  when: common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Apply Homebrew bundle
  ansible.builtin.import_tasks: homebrew-bundle.yml
  when: prerequisites_homebrew_enabled | default(false)
  tags:
    - bootstrap
    - homebrew

- name: Install system-runner early
  ansible.builtin.import_tasks: system-runner.yml
  when: common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - scripts
    - system-runner

- name: Configure Homebrew-backed macOS system settings
  ansible.builtin.import_tasks: macos-system.yml
  when: common_is_macos
  tags:
    - bootstrap
    - macos

- name: Install non-Linux bootstrap packages
  ansible.builtin.import_tasks: packages.yml
  when: not common_is_linux
  tags:
    - bootstrap
    - packages

- name: Install Rust bootstrap
  ansible.builtin.import_tasks: rustup.yml
  tags:
    - bootstrap
    - rustup
