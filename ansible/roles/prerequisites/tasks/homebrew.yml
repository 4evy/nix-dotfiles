---
- name: Set Homebrew paths on macOS
  ansible.builtin.set_fact:
    prerequisites_homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local' }}"
    prerequisites_homebrew_path: >-
      {{
        [
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/coreutils/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/findutils/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/gnu-sed/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/grep/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/gawk/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/gnu-tar/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/gnu-which/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/diffutils/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/make/libexec/gnubin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/opt/gnu-getopt/bin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/bin',
          ('/opt/homebrew' if ansible_facts.architecture == 'arm64' else '/usr/local') ~ '/sbin',
          dotfiles_path,
        ]
        | join(':')
      }}
    prerequisites_modern_bash: "{{ '/opt/homebrew/bin/bash' if ansible_facts.architecture == 'arm64' else '/usr/local/bin/bash' }}"
    prerequisites_homebrew_bootstrap_formulae:
      - bash
      - uv
      - ansible
      - coreutils
      - diffutils
      - findutils
      - gawk
      - gnu-getopt
      - gnu-sed
      - gnu-tar
      - gnu-which
      - grep
      - make
    prerequisites_homebrew_enabled: true
  when: common_is_macos
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Set Homebrew paths on Linux
  ansible.builtin.set_fact:
    prerequisites_homebrew_prefix: /home/linuxbrew/.linuxbrew
    prerequisites_homebrew_path: "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:{{ dotfiles_path }}"
    prerequisites_modern_bash: /home/linuxbrew/.linuxbrew/bin/bash
    prerequisites_homebrew_bootstrap_formulae:
      - bash
      - uv
      - ansible
    prerequisites_homebrew_enabled: true
  when: common_is_linux
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Require supported macOS architecture
  ansible.builtin.assert:
    that:
      - ansible_facts.architecture in ['arm64', 'x86_64']
    fail_msg: "This macOS profile requires Apple Silicon or Intel x86_64."
  when: common_is_macos
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Detect Homebrew
  ansible.builtin.command:
    argv:
      - /bin/test
      - -x
      - "{{ prerequisites_homebrew_prefix }}/bin/brew"
  changed_when: false
  failed_when: false
  register: prerequisites_homebrew_command
  when: prerequisites_homebrew_enabled | default(false)
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Detect sudo credentials for Homebrew install
  ansible.builtin.command:
    argv:
      - sudo
      - -n
      - -v
  changed_when: false
  failed_when: false
  register: prerequisites_homebrew_sudo
  when:
    - prerequisites_homebrew_enabled | default(false)
    - prerequisites_homebrew_command.rc != 0
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Require sudo credentials for Homebrew install
  ansible.builtin.fail:
    msg: >-
      Installing Homebrew at {{ prerequisites_homebrew_prefix }} requires sudo.
      Run ansible/bootstrap.sh from an interactive terminal, or pre-authenticate
      sudo with sudo -v before running ansible-playbook directly.
  when:
    - prerequisites_homebrew_enabled | default(false)
    - prerequisites_homebrew_command.rc != 0
    - prerequisites_homebrew_sudo.rc != 0
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Ensure Homebrew installer cache directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_cache_dir }}/installers"
    state: directory
    mode: "0755"
  when:
    - prerequisites_homebrew_enabled | default(false)
    - prerequisites_homebrew_command.rc != 0
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Download Homebrew upstream installer
  ansible.builtin.get_url:
    url: "{{ prerequisites_homebrew_installer_url }}"
    dest: "{{ dotfiles_cache_dir }}/installers/homebrew-install.sh"
    checksum: "{{ prerequisites_homebrew_installer_checksum | default(omit) }}"
    mode: "0755"
  when:
    - prerequisites_homebrew_enabled | default(false)
    - prerequisites_homebrew_command.rc != 0
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Install Homebrew
  ansible.builtin.command:
    argv:
      - /bin/bash
      - "{{ dotfiles_cache_dir }}/installers/homebrew-install.sh"
    creates: "{{ prerequisites_homebrew_prefix }}/bin/brew"
  environment:
    NONINTERACTIVE: "1"
  when:
    - prerequisites_homebrew_enabled | default(false)
    - prerequisites_homebrew_command.rc != 0
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Ensure Homebrew bootstrap formulae are available
  community.general.homebrew:
    name: "{{ prerequisites_homebrew_bootstrap_formulae }}"
    state: present
    path: "{{ prerequisites_homebrew_prefix }}/bin"
  environment:
    HOMEBREW_NO_ASK: "1"
    PATH: "{{ prerequisites_homebrew_path }}"
  when: prerequisites_homebrew_enabled | default(false)
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Verify GNU userland is on the Homebrew PATH
  ansible.builtin.command:
    argv:
      - "{{ prerequisites_modern_bash }}"
      - -c
      - |
        set -euo pipefail
        for command_name in awk cp date diff find grep install ln make mkdir mktemp mv rm rmdir sed sort stat tar uniq which; do
          "$command_name" --version >/dev/null
          printf '%s %s\n' "$command_name" "$(command -v "$command_name")"
        done
        getopt --version >/dev/null
        printf 'getopt %s\n' "$(command -v getopt)"
  environment:
    PATH: "{{ prerequisites_homebrew_path }}"
  changed_when: false
  when:
    - prerequisites_homebrew_enabled | default(false)
    - common_is_macos
  tags:
    - bootstrap
    - bash
    - homebrew

- name: Verify modern Bash from Homebrew
  ansible.builtin.command:
    argv:
      - "{{ prerequisites_modern_bash }}"
      - -c
      - |
        major=${BASH_VERSINFO[0]}
        minor=${BASH_VERSINFO[1]}
        if ((major < 5 || (major == 5 && minor < 3))); then
          printf 'Bash 5.3 or newer is required; found %s\n' "$BASH_VERSION" >&2
          exit 1
        fi
        printf '%s\n' "$BASH_VERSION"
  changed_when: false
  register: prerequisites_modern_bash_version
  when: prerequisites_homebrew_enabled | default(false)
  tags:
    - bootstrap
    - bash
    - homebrew
