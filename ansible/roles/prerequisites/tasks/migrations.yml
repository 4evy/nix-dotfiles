---
- name: Inspect legacy-managed bootstrap symlinks
  ansible.builtin.stat:
    path: "{{ dotfiles_bin_dir }}/{{ item }}"
    follow: false
  loop:
    - go
    - gofmt
  register: prerequisites_legacy_bootstrap_bins
  tags:
    - bootstrap
    - migration

- name: Remove stale legacy-managed bootstrap symlinks
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  loop: "{{ prerequisites_legacy_bootstrap_bins.results }}"
  when:
    - item.stat.islnk | default(false)
    - >-
      item.stat.lnk_source | default('') is match(
        '^' ~ (dotfiles_home_dir | regex_escape)
        ~ '/\\.local/share/[^/]+/(tools|cache)/'
      )
  tags:
    - bootstrap
    - migration
