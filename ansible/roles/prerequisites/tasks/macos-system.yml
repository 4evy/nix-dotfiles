---
- name: Configure macOS defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ prerequisites_macos_defaults }}"
  loop_control:
    label: "{{ item.domain }}:{{ item.key }}"
  register: prerequisites_macos_defaults_result
  when: common_is_macos
  tags:
    - bootstrap
    - macos

- name: Restart applications affected by macOS defaults
  ansible.builtin.command:
    argv:
      - killall
      - "{{ item }}"
  loop:
    - Dock
    - Finder
    - SystemUIServer
  changed_when: false
  failed_when: false
  when:
    - common_is_macos
    - prerequisites_macos_defaults_result is changed
  tags:
    - bootstrap
    - macos

- name: Register Homebrew Zsh as a macOS login shell
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: /opt/homebrew/bin/zsh
    state: present
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - macos

- name: Configure the macOS account login shell
  ansible.builtin.user:
    name: >-
      {{ ansible_facts.get('user_id',
         ansible_facts.get('ansible_user_id', lookup('env', 'USER'))) }}
    shell: /opt/homebrew/bin/zsh
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - macos

- name: Ensure macOS dotfiles application support directory exists
  ansible.builtin.file:
    path: /Library/Application Support/dotfiles
    state: directory
    owner: root
    group: wheel
    mode: "0755"
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Detect legacy user-scoped Tailscale service
  ansible.builtin.stat:
    path: "{{ dotfiles_home_dir }}/Library/LaunchAgents/homebrew.mxcl.tailscale.plist"
  register: prerequisites_tailscale_user_service
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Stop legacy user-scoped Tailscale service
  ansible.builtin.command:
    argv:
      - /opt/homebrew/bin/brew
      - services
      - stop
      - tailscale
  environment:
    HOME: "{{ dotfiles_home_dir }}"
    PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/bin:/bin:/usr/sbin:/sbin
  changed_when: true
  when:
    - common_is_macos
    - prerequisites_tailscale_user_service.stat.exists
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Detect system Tailscale service definition
  ansible.builtin.stat:
    path: /Library/LaunchDaemons/homebrew.mxcl.tailscale.plist
  register: prerequisites_tailscale_system_service
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Install Tailscale as a system launch daemon
  ansible.builtin.command:
    argv:
      - /opt/homebrew/bin/brew
      - services
      - start
      - tailscale
  environment:
    PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/bin:/bin:/usr/sbin:/sbin
  become: true
  register: prerequisites_tailscale_system_service_install
  changed_when: >-
    'Successfully started' in prerequisites_tailscale_system_service_install.stdout
  when:
    - common_is_macos
    - not prerequisites_tailscale_system_service.stat.exists
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Ensure the Tailscale system launch daemon is running
  community.general.launchd:
    name: homebrew.mxcl.tailscale
    enabled: true
    state: started
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Wait for the Tailscale daemon socket
  ansible.builtin.wait_for:
    path: /var/run/tailscaled.socket
    state: present
    timeout: 15
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Install Tailscale SSH launch daemon helper
  ansible.builtin.template:
    src: "{{ dotfiles_ansible_dir }}/files/scripts/macos/templates/tailscale-ssh-helper.py.in"
    dest: /Library/Application Support/dotfiles/tailscale-ssh.py
    owner: root
    group: wheel
    mode: "0755"
    variable_start_string: "@"
    variable_end_string: "@"
  vars:
    prerequisites_tailscale_bin: /opt/homebrew/bin/tailscale
  become: true
  register: prerequisites_tailscale_ssh_helper_result
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Remove legacy Tailscale SSH shell helper
  ansible.builtin.file:
    path: /Library/Application Support/dotfiles/tailscale-ssh.sh
    state: absent
  become: true
  register: prerequisites_tailscale_ssh_legacy_helper
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Install Tailscale SSH launch daemon definition
  ansible.builtin.template:
    src: "{{ dotfiles_ansible_dir }}/files/scripts/macos/templates/tailscale-ssh.plist.in"
    dest: /Library/LaunchDaemons/dev.4evy.tailscale-ssh.plist
    owner: root
    group: wheel
    mode: "0644"
    variable_start_string: "@"
    variable_end_string: "@"
  vars:
    prerequisites_tailscale_ssh_label: dev.4evy.tailscale-ssh
    prerequisites_tailscale_ssh_helper: /Library/Application Support/dotfiles/tailscale-ssh.py
  register: prerequisites_tailscale_ssh_plist
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Configure Tailscale SSH launch daemon on macOS
  community.general.launchd:
    name: dev.4evy.tailscale-ssh
    enabled: true
    state: >-
      {{
        'restarted'
        if prerequisites_tailscale_ssh_helper_result is changed
        or prerequisites_tailscale_ssh_legacy_helper is changed
        or prerequisites_tailscale_ssh_plist is changed
        else 'started'
      }}
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - macos
    - tailscale

- name: Configure Karabiner VirtualHID driver on macOS
  evy.dotfiles.operation:
    executable: "{{ dotfiles_bin_dir }}/dotfiles-scripts"
    command:
      - macos
      - karabiner-vhid
    context: "{{ dotfiles_automation_context }}"
    chdir: "{{ dotfiles_repo_root }}"
    environment:
      PATH: "{{ prerequisites_homebrew_path }}"
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - kanata
    - macos

- name: Configure Kanata launch daemons on macOS
  evy.dotfiles.operation:
    executable: "{{ dotfiles_bin_dir }}/dotfiles-scripts"
    command:
      - macos
      - kanata
      - "{{ dotfiles_repo_root }}/dotfiles/dot_config/kanata/kanata-macos.kbd"
    context: "{{ dotfiles_automation_context }}"
    chdir: "{{ dotfiles_repo_root }}"
    environment:
      PATH: "{{ prerequisites_homebrew_path }}"
  become: true
  when: common_is_macos
  tags:
    - bootstrap
    - kanata
    - macos
