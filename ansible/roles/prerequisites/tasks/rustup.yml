---
- name: Detect rustup
  ansible.builtin.command:
    argv:
      - rustup
      - --version
  environment:
    PATH: "{{ prerequisites_homebrew_path | default(dotfiles_path) }}"
  changed_when: false
  failed_when: false
  register: prerequisites_rustup_command
  tags:
    - bootstrap
    - rustup

- name: Ensure Rustup installer cache directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_cache_dir }}/installers"
    state: directory
    mode: "0755"
  when:
    - common_system in ['Darwin', 'Linux']
    - prerequisites_rustup_command.rc != 0
  tags:
    - bootstrap
    - rustup

- name: Download Rustup upstream installer
  ansible.builtin.get_url:
    url: "{{ prerequisites_rustup_installer_url }}"
    dest: "{{ dotfiles_cache_dir }}/installers/rustup-init.sh"
    checksum: "{{ prerequisites_rustup_installer_checksum | default(omit) }}"
    mode: "0755"
  when:
    - common_system in ['Darwin', 'Linux']
    - prerequisites_rustup_command.rc != 0
  tags:
    - bootstrap
    - rustup

- name: Install Rustup when missing
  ansible.builtin.command:
    argv:
      - sh
      - "{{ dotfiles_cache_dir }}/installers/rustup-init.sh"
      - -y
      - --profile
      - default
    creates: "{{ dotfiles_home_dir }}/.cargo/bin/rustup"
  environment:
    PATH: "{{ prerequisites_homebrew_path | default(dotfiles_path) }}"
  when:
    - common_system in ['Darwin', 'Linux']
    - prerequisites_rustup_command.rc != 0
  tags:
    - bootstrap
    - rustup

- name: Check local Rustup binary
  ansible.builtin.stat:
    path: "{{ dotfiles_home_dir }}/.cargo/bin/rustup"
  register: prerequisites_local_rustup
  tags:
    - bootstrap
    - rustup

- name: Select Rustup binary
  ansible.builtin.set_fact:
    prerequisites_rustup_bin: >-
      {{
        dotfiles_home_dir + '/.cargo/bin/rustup'
        if prerequisites_local_rustup.stat.executable | default(false)
        else 'rustup'
      }}
  tags:
    - bootstrap
    - rustup

- name: Install Rustup components
  ansible.builtin.command:
    argv:
      - "{{ prerequisites_rustup_bin }}"
      - toolchain
      - install
      - stable
      - --profile
      - default
      - --component
      - rustfmt
      - --component
      - clippy
      - --component
      - rust-analyzer
      - --component
      - rust-src
  environment:
    PATH: "{{ prerequisites_homebrew_path | default(dotfiles_path) }}"
  changed_when: "'unchanged' not in prerequisites_rustup_toolchain.stderr"
  failed_when: prerequisites_rustup_toolchain.rc != 0
  register: prerequisites_rustup_toolchain
  when: >-
    prerequisites_rustup_command.rc == 0
    or common_system in ['Darwin', 'Linux']
  tags:
    - bootstrap
    - rustup
