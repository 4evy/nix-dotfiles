---
- name: Install Visual Studio Code on apt systems
  ansible.builtin.import_tasks: vscode-apt.yml
  when:
    - ansible_facts.pkg_mgr == 'apt'
    - common_is_linux
  tags:
    - apps
    - vscode

- name: Install Visual Studio Code on dnf systems
  ansible.builtin.import_tasks: vscode-rpm.yml
  when:
    - ansible_facts.pkg_mgr in ['dnf', 'dnf5']
    - not common_has_rpm_ostree
    - common_is_linux
  tags:
    - apps
    - vscode

- name: Install 1Password on apt systems
  ansible.builtin.import_tasks: one-password-apt.yml
  when:
    - ansible_facts.pkg_mgr == 'apt'
    - common_is_linux
  tags:
    - apps
    - 1password

- name: Install 1Password on rpm systems
  ansible.builtin.import_tasks: one-password-rpm.yml
  when:
    - ansible_facts.pkg_mgr in ['dnf', 'dnf5']
    - not common_has_rpm_ostree
    - common_is_linux
  tags:
    - apps
    - 1password

- name: Install Discord on apt systems
  ansible.builtin.import_tasks: discord-apt.yml
  when:
    - ansible_facts.pkg_mgr == 'apt'
    - common_is_linux
  tags:
    - apps
    - discord

- name: Install Discord on dnf systems
  ansible.builtin.import_tasks: discord-rpm.yml
  when:
    - ansible_facts.pkg_mgr in ['dnf', 'dnf5']
    - not common_has_rpm_ostree
    - common_is_linux
  tags:
    - apps
    - discord

- name: Install Equicord for Discord on Linux
  ansible.builtin.import_tasks: equicord.yml
  when:
    - common_is_linux
  tags:
    - apps
    - discord
    - equicord

- name: Install native Ghostty tip build on Linux
  evy.dotfiles.operation:
    executable: "{{ dotfiles_bin_dir }}/dotfiles-scripts"
    command:
      - apps
      - install-ghostty-tip-linux
      - "{{ dotfiles_cache_dir }}/ghostty"
      - "{{ dotfiles_home_dir }}/.local"
    context: "{{ dotfiles_automation_context }}"
    chdir: "{{ dotfiles_repo_root }}"
    environment:
      PATH: "{{ dotfiles_bin_dir }}:{{ dotfiles_path }}"
  when: common_is_linux
  tags:
    - apps
    - ghostty

- name: Install Ghostty's JetBrains Mono Nerd Font on macOS
  community.general.homebrew_cask:
    name: font-jetbrains-mono-nerd-font
    state: present
    path: "{{ prerequisites_homebrew_prefix }}/bin"
  environment:
    HOMEBREW_NO_ASK: "1"
    PATH: "{{ prerequisites_homebrew_path }}"
  when: common_is_macos
  tags:
    - apps
    - fonts
    - ghostty

- name: Install patched native Ghostty tip build on macOS
  evy.dotfiles.operation:
    executable: "{{ dotfiles_bin_dir }}/dotfiles-scripts"
    command:
      - apps
      - install-ghostty-tip-macos
      - "{{ dotfiles_cache_dir }}/ghostty-macos"
      - "{{ dotfiles_data_home }}/ghostty-patched"
      - "{{ prerequisites_homebrew_prefix }}/opt/zig@0.15/bin/zig"
    context: "{{ dotfiles_automation_context }}"
    chdir: "{{ dotfiles_repo_root }}"
    environment:
      PATH: "{{ dotfiles_bin_dir }}:{{ dotfiles_path }}"
  when: common_is_macos
  tags:
    - apps
    - ghostty

- name: Link patched Ghostty application bundle on macOS
  ansible.builtin.file:
    src: "{{ dotfiles_data_home }}/ghostty-patched/Ghostty.app"
    dest: /Applications/Ghostty.app
    state: link
    force: true
  when: common_is_macos
  tags:
    - apps
    - ghostty

- name: Install native Helix tip build
  ansible.builtin.import_tasks: helix.yml
  when: common_is_linux or common_is_macos
  tags:
    - apps
    - helix

- name: Install Helium on Linux
  evy.dotfiles.operation:
    executable: "{{ dotfiles_bin_dir }}/dotfiles-scripts"
    command:
      - apps
      - install-helium-linux
      - "{{ dotfiles_cache_dir }}/helium-browser"
      - "{{ dotfiles_data_dir }}/helium-browser"
      - "{{ dotfiles_bin_dir }}"
      - "{{ dotfiles_cache_dir }}/helium-browser/installer-bin"
      - "{{ dotfiles_repo_root }}/secrets/secrets.yaml"
      - "--flags={{ helium_linux_flags }}"
    context: "{{ dotfiles_automation_context }}"
    chdir: "{{ dotfiles_repo_root }}"
    environment:
      PATH: "{{ dotfiles_bin_dir }}:{{ dotfiles_path }}"
  vars:
    helium_enabled_features:
      - TouchpadOverscrollHistoryNavigation
    helium_disabled_features:
      - ExtensionManifestV2Unsupported
      - ExtensionManifestV2Disabled
      - BrowsingTopics
      - InterestGroupStorage
      - WaylandWpColorManagerV1
    helium_common_flags: >-
      --no-first-run --no-default-browser-check --disable-search-engine-choice-screen
      --extension-mime-request-handling=always-prompt-for-install
      --omnibox-autocomplete-filtering=search --set-user-color=244,184,228
      --set-color-scheme=dark --set-color-variant=tonal_spot
    helium_linux_flags: >-
      --ozone-platform=x11 --disable-gpu-process-crash-limit
      --enable-gpu-rasterization
      --enable-features={{ helium_enabled_features | join(',') }}
      --disable-features={{ helium_disabled_features | join(',') }}
      {{ helium_common_flags }}
  when: common_is_linux
  tags:
    - apps
    - helium

- name: Detect AppArmor support for Helium on Linux
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - >-
        test -r /sys/module/apparmor/parameters/enabled &&
        grep -qi '^Y' /sys/module/apparmor/parameters/enabled &&
        command -v apparmor_parser >/dev/null
  changed_when: false
  failed_when: false
  register: applications_helium_apparmor
  when: common_is_linux
  tags:
    - apps
    - helium

- name: Install AppArmor profile for Helium archive install
  ansible.builtin.copy:
    dest: /etc/apparmor.d/dotfiles-helium-browser
    mode: "0644"
    content: |
      abi <abi/4.0>,
      include <tunables/global>

      profile dotfiles-helium-browser "{{ dotfiles_data_dir }}/helium-browser/app/helium" flags=(default_allow) {
        userns,
        include if exists <local/dotfiles-helium-browser>
      }
  become: true
  register: applications_helium_apparmor_profile
  when:
    - common_is_linux
    - applications_helium_apparmor.rc | default(1) == 0
  tags:
    - apps
    - helium

- name: Reload AppArmor profile for Helium archive install
  ansible.builtin.command:
    argv:
      - apparmor_parser
      - -r
      - /etc/apparmor.d/dotfiles-helium-browser
  become: true
  changed_when: applications_helium_apparmor_profile.changed
  when:
    - common_is_linux
    - applications_helium_apparmor.rc | default(1) == 0
    - applications_helium_apparmor_profile.changed | default(false)
  tags:
    - apps
    - helium

- name: Install macOS GUI applications
  ansible.builtin.import_tasks: macos.yml
  when: common_is_macos
  tags:
    - apps
    - macos
