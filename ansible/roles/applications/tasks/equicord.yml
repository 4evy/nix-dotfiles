---
- name: Fetch latest Equilotl release metadata
  ansible.builtin.uri:
    url: https://api.github.com/repos/Equicord/Equilotl/releases/latest
    headers:
      Accept: application/vnd.github+json
      User-Agent: dotfiles-ansible
    return_content: true
    status_code: 200
    timeout: 30
  register: applications_equilotl_release

- name: Select Equilotl Linux CLI asset
  ansible.builtin.set_fact:
    applications_equilotl_linux_url: >-
      {{
        applications_equilotl_release.json.assets
        | selectattr('name', 'equalto', 'EquilotlCli-linux')
        | map(attribute='browser_download_url')
        | first
      }}

- name: Require Equilotl Linux CLI asset
  ansible.builtin.assert:
    that:
      - applications_equilotl_linux_url is defined
      - applications_equilotl_linux_url | default('') | length > 0
    fail_msg: >-
      Latest Equilotl release does not include the expected
      EquilotlCli-linux asset.

- name: Install Equilotl Linux CLI
  ansible.builtin.get_url:
    url: "{{ applications_equilotl_linux_url }}"
    dest: "{{ dotfiles_bin_dir }}/EquilotlCli-linux"
    mode: "0755"

- name: Install Discord Equicord shared script library
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_scripts_dir }}/host/lib/"
    dest: "{{ dotfiles_home_dir }}/.local/lib/dotfiles/host/lib/"
    mode: "0644"
    directory_mode: "0755"

- name: Install Discord Equicord launcher
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_scripts_dir }}/apps/discord-equicord.sh"
    dest: "{{ dotfiles_bin_dir }}/discord-equicord"
    mode: "0755"

- name: Ensure local applications directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home_dir }}/.local/share/applications"
    state: directory
    mode: "0755"

- name: Install user Discord desktop entry through Equicord launcher
  ansible.builtin.copy:
    dest: "{{ dotfiles_home_dir }}/.local/share/applications/discord.desktop"
    mode: "0644"
    content: |
      [Desktop Entry]
      Name=Discord
      StartupWMClass=discord
      Comment=All-in-one voice and text chat for gamers that's free, secure, and works on both your desktop and phone.
      GenericName=Internet Messenger
      Exec={{ dotfiles_bin_dir }}/discord-equicord --url -- %u
      Icon=discord
      Type=Application
      Categories=Network;InstantMessaging;
      MimeType=x-scheme-handler/discord;
      Path={{ dotfiles_home_dir }}

- name: Ensure Equicord settings directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home_dir }}/.config/Equicord/settings"
    state: directory
    mode: "0755"

- name: Install generated Equicord plugin settings
  ansible.builtin.command:
    argv:
      - nix
      - eval
      - --json
      - .#lib.equicordSettingsJson
  args:
    chdir: "{{ dotfiles_repo_root }}"
  register: applications_equicord_settings
  changed_when: false

- name: Write generated Equicord plugin settings
  ansible.builtin.copy:
    content: "{{ applications_equicord_settings.stdout | from_json | to_nice_json }}\n"
    dest: "{{ dotfiles_home_dir }}/.config/Equicord/settings/settings.json"
    mode: "0644"

- name: Install Equicord QuickCSS
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_dir }}/files/apps/equicord/quickCss.css"
    dest: "{{ dotfiles_home_dir }}/.config/Equicord/settings/quickCss.css"
    mode: "0644"

- name: Repair Discord with Equicord launcher
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_bin_dir }}/discord-equicord"
      - --repair-only
  environment:
    HOME: "{{ dotfiles_home_dir }}"
  changed_when: false
