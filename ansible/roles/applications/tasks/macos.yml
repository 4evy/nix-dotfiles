---
- name: Link the RustDesk application command on macOS
  ansible.builtin.file:
    src: /Applications/RustDesk.app/Contents/MacOS/RustDesk
    dest: "{{ dotfiles_bin_dir }}/rustdesk"
    state: link
    force: true
  tags:
    - rustdesk

- name: Ensure RustDesk configuration directories exist on macOS
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dotfiles_home_dir }}/Library/Preferences/com.carriez.RustDesk"
    - "{{ dotfiles_home_dir }}/Library/LaunchAgents"
  tags:
    - rustdesk

- name: Install RustDesk direct-access settings on macOS
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_dir }}/files/scripts/apps/rustdesk/RustDesk2.toml"
    dest: "{{ dotfiles_home_dir }}/Library/Preferences/com.carriez.RustDesk/RustDesk2.toml"
    mode: "0644"
  tags:
    - rustdesk

- name: Install RustDesk launch agent on macOS
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_dir }}/files/scripts/apps/rustdesk/com.carriez.RustDesk.plist"
    dest: "{{ dotfiles_home_dir }}/Library/LaunchAgents/com.carriez.RustDesk.plist"
    mode: "0644"
  register: applications_rustdesk_launch_agent
  tags:
    - rustdesk

- name: Start the RustDesk launch agent on macOS
  community.general.launchd:
    name: com.carriez.RustDesk
    enabled: true
    state: "{{ 'restarted' if applications_rustdesk_launch_agent is changed else 'started' }}"
  tags:
    - rustdesk

- name: Ensure Equicord settings directory exists on macOS
  ansible.builtin.file:
    path: "{{ dotfiles_home_dir }}/Library/Application Support/Equicord/settings"
    state: directory
    mode: "0755"
  tags:
    - discord
    - equicord

- name: Require ARM64 macOS for Equilotl CLI
  ansible.builtin.assert:
    that:
      - >-
        ansible_facts.get('architecture', ansible_facts.get('ansible_architecture', '')) == 'arm64'
    fail_msg: "This dotfiles Equicord macOS install path only supports ARM64 Macs."
  tags:
    - discord
    - equicord

- name: Fetch latest Equilotl release metadata on macOS
  ansible.builtin.uri:
    url: https://api.github.com/repos/Equicord/Equilotl/releases/latest
    headers:
      Accept: application/vnd.github+json
      User-Agent: dotfiles-ansible
    return_content: true
    status_code: 200
    timeout: 30
  register: applications_equilotl_release_macos
  tags:
    - discord
    - equicord

- name: Select Equilotl macOS ARM64 CLI asset
  ansible.builtin.set_fact:
    applications_equilotl_macos_arm64_url: >-
      {{
        applications_equilotl_release_macos.json.assets
        | selectattr('name', 'equalto', 'EquilotlCli-darwin-arm64')
        | map(attribute='browser_download_url')
        | first
      }}
  tags:
    - discord
    - equicord

- name: Require Equilotl macOS ARM64 CLI asset
  ansible.builtin.assert:
    that:
      - applications_equilotl_macos_arm64_url is defined
      - applications_equilotl_macos_arm64_url | default('') | length > 0
    fail_msg: >-
      Latest Equilotl release does not include the expected
      EquilotlCli-darwin-arm64 asset.
  tags:
    - discord
    - equicord

- name: Install Equilotl macOS ARM64 CLI
  ansible.builtin.get_url:
    url: "{{ applications_equilotl_macos_arm64_url }}"
    dest: "{{ dotfiles_bin_dir }}/EquilotlCli-darwin-arm64"
    mode: "0755"
  tags:
    - discord
    - equicord

- name: Install generated Equicord plugin settings on macOS
  ansible.builtin.command:
    argv:
      - nix
      - eval
      - --json
      - .#lib.equicordSettingsJson
  args:
    chdir: "{{ dotfiles_repo_root }}"
  register: applications_equicord_settings_macos
  changed_when: false
  tags:
    - discord
    - equicord

- name: Write generated Equicord plugin settings on macOS
  ansible.builtin.copy:
    content: "{{ applications_equicord_settings_macos.stdout | from_json | to_nice_json }}\n"
    dest: "{{ dotfiles_home_dir }}/Library/Application Support/Equicord/settings/settings.json"
    mode: "0644"
  tags:
    - discord
    - equicord

- name: Install Equicord QuickCSS on macOS
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_dir }}/files/apps/equicord/quickCss.css"
    dest: "{{ dotfiles_home_dir }}/Library/Application Support/Equicord/settings/quickCss.css"
    mode: "0644"
  tags:
    - discord
    - equicord

- name: Clear Equicord macOS ASAR file locks before patch
  ansible.builtin.command:
    argv:
      - chflags
      - nouchg
      - /Applications/Discord.app/Contents/Resources/app.asar
      - /Applications/Discord.app/Contents/Resources/_app.asar
  changed_when: false
  failed_when: false
  tags:
    - discord
    - equicord

- name: Install Equicord into Discord on macOS
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_bin_dir }}/EquilotlCli-darwin-arm64"
      - --install
      - --branch
      - stable
  environment:
    HOME: "{{ dotfiles_home_dir }}"
  changed_when: false
  tags:
    - discord
    - equicord

- name: Lock Equicord macOS ASAR files against Discord updater overwrite
  ansible.builtin.command:
    argv:
      - chflags
      - uchg
      - /Applications/Discord.app/Contents/Resources/app.asar
      - /Applications/Discord.app/Contents/Resources/_app.asar
  changed_when: false
  tags:
    - discord
    - equicord

- name: Install Helium Homebrew cask on macOS
  community.general.homebrew_cask:
    name: helium-browser
    state: present
    path: "{{ prerequisites_homebrew_prefix | default('/opt/homebrew') }}/bin"
  environment:
    HOMEBREW_NO_ASK: "1"
    PATH: "{{ prerequisites_homebrew_path | default(dotfiles_path) }}"
  tags:
    - helium

- name: Configure Helium on macOS
  evy.dotfiles.operation:
    executable: "{{ dotfiles_bin_dir }}/dotfiles-scripts"
    command:
      - apps
      - install-helium-macos
      - "{{ dotfiles_cache_dir }}/helium-browser"
      - "{{ dotfiles_bin_dir }}"
      - "{{ dotfiles_cache_dir }}/helium-browser/installer-bin"
      - "{{ dotfiles_repo_root }}/secrets/secrets.yaml"
      - >-
        --no-first-run --no-default-browser-check --disable-search-engine-choice-screen
        --extension-mime-request-handling=always-prompt-for-install
        --omnibox-autocomplete-filtering=search --set-user-color=244,184,228
        --set-color-scheme=dark --set-color-variant=tonal_spot
    context: "{{ dotfiles_automation_context }}"
    chdir: "{{ dotfiles_repo_root }}"
    environment:
      PATH: "{{ prerequisites_homebrew_path | default(dotfiles_path) }}"
  tags:
    - helium

- name: Set Raycast Beta install paths
  ansible.builtin.set_fact:
    applications_raycast_beta_root: "{{ dotfiles_cache_dir }}/raycast-beta"
    applications_raycast_beta_dmg: "{{ dotfiles_cache_dir }}/raycast-beta/Raycast_Beta.dmg"
    applications_raycast_beta_mount: "{{ dotfiles_cache_dir }}/raycast-beta/mount"
    applications_raycast_beta_app: /Applications/Raycast Beta.app
  tags:
    - raycast

- name: Check Raycast Beta app
  ansible.builtin.stat:
    path: "{{ applications_raycast_beta_app }}"
  register: applications_raycast_beta_stat
  tags:
    - raycast

- name: Fetch Raycast Beta release page
  ansible.builtin.uri:
    url: https://www.raycast.com/new
    return_content: true
    status_code: 200
    timeout: 30
  register: applications_raycast_beta_page
  when: not applications_raycast_beta_stat.stat.exists
  tags:
    - raycast

- name: Select Raycast Beta DMG URL
  ansible.builtin.set_fact:
    applications_raycast_beta_url: >-
      {{
        applications_raycast_beta_page.content
        | regex_findall('https://x-r2\\.raycast-releases\\.com/[^"]+\\.dmg')
        | first
        | default('')
      }}
  when: not applications_raycast_beta_stat.stat.exists
  tags:
    - raycast

- name: Require Raycast Beta DMG URL
  ansible.builtin.assert:
    that:
      - applications_raycast_beta_url is defined
      - applications_raycast_beta_url | length > 0
    fail_msg: Raycast Beta release page did not include a DMG URL.
  when: not applications_raycast_beta_stat.stat.exists
  tags:
    - raycast

- name: Ensure Raycast Beta cache directory exists
  ansible.builtin.file:
    path: "{{ applications_raycast_beta_root }}"
    state: directory
    mode: "0755"
  when: not applications_raycast_beta_stat.stat.exists
  tags:
    - raycast

- name: Download Raycast Beta DMG
  ansible.builtin.get_url:
    url: "{{ applications_raycast_beta_url }}"
    dest: "{{ applications_raycast_beta_dmg }}"
    mode: "0644"
  when: not applications_raycast_beta_stat.stat.exists
  tags:
    - raycast

- name: Install Raycast Beta from DMG
  when: not applications_raycast_beta_stat.stat.exists
  tags:
    - raycast
  block:
    - name: Reset Raycast Beta mount directory
      ansible.builtin.file:
        path: "{{ applications_raycast_beta_mount }}"
        state: absent

    - name: Create Raycast Beta mount directory
      ansible.builtin.file:
        path: "{{ applications_raycast_beta_mount }}"
        state: directory
        mode: "0755"

    - name: Mount Raycast Beta DMG
      ansible.builtin.command:
        argv:
          - hdiutil
          - attach
          - "{{ applications_raycast_beta_dmg }}"
          - -nobrowse
          - -readonly
          - -mountpoint
          - "{{ applications_raycast_beta_mount }}"
      changed_when: true

    - name: Remove installed Raycast Beta app before replacement
      ansible.builtin.file:
        path: "{{ applications_raycast_beta_app }}"
        state: absent

    - name: Copy Raycast Beta app
      ansible.builtin.command:
        argv:
          - ditto
          - "{{ applications_raycast_beta_mount }}/Raycast Beta.app"
          - "{{ applications_raycast_beta_app }}"
      changed_when: true
  always:
    - name: Detach Raycast Beta DMG
      ansible.builtin.command:
        argv:
          - hdiutil
          - detach
          - "{{ applications_raycast_beta_mount }}"
      changed_when: false
      failed_when: false
