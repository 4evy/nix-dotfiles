---
- name: Detect GNOME support for Hyper window tiling
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - version
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_hyper_gnome_command
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Detect KDE support for Hyper window tiling
  ansible.builtin.command:
    argv:
      - plasmashell
      - --version
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_hyper_kde_command
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Check KDE installation paths
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/share/plasma
    - /usr/share/wayland-sessions/plasma.desktop
  register: host_layer_hyper_kde_paths
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Select available Hyper window tiling desktops
  ansible.builtin.set_fact:
    host_layer_hyper_has_gnome: "{{ host_layer_hyper_gnome_command.rc == 0 }}"
    host_layer_hyper_has_kde: >-
      {{
        host_layer_hyper_kde_command.rc == 0
        or host_layer_hyper_kde_paths.results
          | selectattr('stat.exists')
          | list
          | length > 0
      }}
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Install Hyper window tiling build dependencies
  ansible.builtin.command:
    argv:
      - bun
      - install
      - --frozen-lockfile
    chdir: "{{ host_layer_hyper_window_tiling_package }}"
  changed_when: false
  when: host_layer_hyper_has_gnome or host_layer_hyper_has_kde
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Build Hyper window tiling integrations
  ansible.builtin.command:
    argv:
      - bun
      - run
      - build
    chdir: "{{ host_layer_hyper_window_tiling_package }}"
  changed_when: false
  when: host_layer_hyper_has_gnome or host_layer_hyper_has_kde
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Create Hyper GNOME extension directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ host_layer_hyper_window_tiling_gnome_dir }}"
    - "{{ host_layer_hyper_window_tiling_gnome_dir }}/schemas"
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Install Hyper GNOME extension files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: "{{ host_layer_hyper_window_tiling_package }}/gnome/metadata.json"
      dest: "{{ host_layer_hyper_window_tiling_gnome_dir }}/metadata.json"
    - src: "{{ host_layer_hyper_window_tiling_package }}/dist/gnome/extension.js"
      dest: "{{ host_layer_hyper_window_tiling_gnome_dir }}/extension.js"
  loop_control:
    label: "{{ item.dest | basename }}"
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Install Hyper GNOME extension schema
  ansible.builtin.copy:
    src: >-
      {{
        host_layer_hyper_window_tiling_package
        ~ '/gnome/schemas/org.gnome.shell.extensions.hyper-window-tiling.gschema.xml'
      }}
    dest: >-
      {{
        host_layer_hyper_window_tiling_gnome_dir
        ~ '/schemas/org.gnome.shell.extensions.hyper-window-tiling.gschema.xml'
      }}
    mode: "0644"
  register: host_layer_hyper_gnome_schema
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Compile Hyper GNOME extension schemas
  ansible.builtin.command:
    argv:
      - glib-compile-schemas
      - "{{ host_layer_hyper_window_tiling_gnome_dir }}/schemas"
  changed_when: true
  when:
    - host_layer_hyper_has_gnome
    - host_layer_hyper_gnome_schema is changed
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Read enabled GNOME extensions for Hyper window tiling
  community.general.dconf:
    key: /org/gnome/shell/enabled-extensions
    state: read
  register: host_layer_hyper_gnome_extensions
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Persist Hyper GNOME extension activation
  community.general.dconf:
    key: /org/gnome/shell/enabled-extensions
    value: >-
      {{
        host_layer_hyper_gnome_extensions.value
        | default('@as []', true)
        | merge_gvariant_string_list(host_layer_hyper_window_tiling_uuid)
      }}
    state: present
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Configure Hyper GNOME extension shortcuts
  community.general.dconf:
    key: "/org/gnome/shell/extensions/hyper-window-tiling/{{ item.key }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ host_layer_hyper_window_tiling_gnome_keys }}"
  loop_control:
    label: "{{ item.key }}"
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Free GNOME workspace navigation shortcuts for Hyper window tiling
  community.general.dconf:
    key: "/org/gnome/desktop/wm/keybindings/{{ item }}"
    value: "@as []"
    state: present
  loop:
    - switch-to-workspace-left
    - switch-to-workspace-right
    - move-to-workspace-left
    - move-to-workspace-right
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: List enabled GNOME extensions for Hyper window tiling
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - list
      - --enabled
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_hyper_gnome_enabled
  when: host_layer_hyper_has_gnome
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Enable Hyper GNOME extension in the active session
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - enable
      - "{{ host_layer_hyper_window_tiling_uuid }}"
  changed_when: host_layer_hyper_gnome_enable.rc == 0
  failed_when: false
  register: host_layer_hyper_gnome_enable
  when:
    - not ansible_check_mode
    - host_layer_hyper_has_gnome
    - >-
      host_layer_hyper_window_tiling_uuid
      not in host_layer_hyper_gnome_enabled.stdout_lines | default([])
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Create Hyper KWin script directories
  ansible.builtin.file:
    path: "{{ item.0 }}/{{ item.1 }}"
    state: directory
    mode: "0755"
  loop: >-
    {{
      host_layer_hyper_window_tiling_kwin_dirs
      | product(['', 'contents', 'contents/code'])
      | list
    }}
  when: host_layer_hyper_has_kde
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Install Hyper KWin scripts
  ansible.builtin.copy:
    src: "{{ item.1.src }}"
    dest: "{{ item.0 }}/{{ item.1.dest }}"
    mode: "0644"
  loop: >-
    {{
      host_layer_hyper_window_tiling_kwin_dirs
      | product([
          {
            'src': host_layer_hyper_window_tiling_package ~ '/kde/metadata.json',
            'dest': 'metadata.json'
          },
          {
            'src': host_layer_hyper_window_tiling_package
              ~ '/dist/kde/contents/code/main.js',
            'dest': 'contents/code/main.js'
          }
        ])
      | list
    }}
  register: host_layer_hyper_kwin_scripts
  when: host_layer_hyper_has_kde
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Enable Hyper KWin script
  community.general.ini_file:
    path: "{{ dotfiles_config_home }}/kwinrc"
    section: Plugins
    option: hyper-window-tilingEnabled
    value: "true"
    no_extra_spaces: true
    mode: "0600"
  register: host_layer_hyper_kwin_config
  when: host_layer_hyper_has_kde
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Detect KDE D-Bus command
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - command -v qdbus6 || command -v qdbus
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_hyper_qdbus
  when: host_layer_hyper_has_kde
  tags:
    - host
    - desktop
    - hyper-window-tiling

- name: Reload KWin after Hyper script changes
  ansible.builtin.command:
    argv:
      - "{{ host_layer_hyper_qdbus.stdout | trim }}"
      - org.kde.KWin
      - /KWin
      - reconfigure
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - host_layer_hyper_has_kde
    - host_layer_hyper_qdbus.rc == 0
    - host_layer_hyper_kwin_scripts is changed or host_layer_hyper_kwin_config is changed
  tags:
    - host
    - desktop
    - hyper-window-tiling
