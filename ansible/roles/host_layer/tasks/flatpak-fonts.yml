---
- name: Create Flatpak fontconfig directory for {{ host_layer_flatpak_app.path | basename }}
  ansible.builtin.file:
    path: "{{ host_layer_flatpak_app.path }}/config/fontconfig/conf.d"
    state: directory
    mode: "0755"
  when: host_layer_user_fontconfig_files.files | default([]) | length > 0

- name: Sync fontconfig fragments for {{ host_layer_flatpak_app.path | basename }}
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: >-
      {{ host_layer_flatpak_app.path }}/config/fontconfig/conf.d/{{ item.path | basename }}
    remote_src: true
    mode: preserve
  loop: "{{ host_layer_user_fontconfig_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Check Flatpak font cache for {{ host_layer_flatpak_app.path | basename }}
  ansible.builtin.stat:
    path: "{{ host_layer_flatpak_app.path }}/cache/fontconfig"
  register: host_layer_flatpak_font_cache_directory

- name: Find stale Flatpak font caches for {{ host_layer_flatpak_app.path | basename }}
  ansible.builtin.find:
    paths: "{{ host_layer_flatpak_app.path }}/cache/fontconfig"
    patterns: "*cache-*"
    file_type: file
    recurse: false
  register: host_layer_stale_flatpak_font_caches
  when: host_layer_flatpak_font_cache_directory.stat.isdir | default(false)

- name: Remove stale Flatpak font caches for {{ host_layer_flatpak_app.path | basename }}
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ host_layer_stale_flatpak_font_caches.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
