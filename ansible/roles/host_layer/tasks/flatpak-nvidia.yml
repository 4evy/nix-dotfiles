---
- name: Discover active Flatpak GL drivers
  ansible.builtin.command:
    argv:
      - flatpak
      - --gl-drivers
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_flatpak_gl_drivers
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Discover user Flatpak remotes
  ansible.builtin.command:
    argv:
      - flatpak
      - remotes
      - --user
      - --columns=name
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_user_flatpak_remotes
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Discover system Flatpak remotes
  ansible.builtin.command:
    argv:
      - flatpak
      - remotes
      - --system
      - --columns=name
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_system_flatpak_remotes
  when:
    - host_layer_flatpak_command.rc == 0
    - host_layer_system_flatpak.stat.isdir | default(false)
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Discover user NVIDIA VA-API runtime branches
  ansible.builtin.command:
    argv:
      - flatpak
      - remote-ls
      - --user
      - flathub
      - --runtime
      - --columns=application,branch
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_user_flatpak_runtimes
  when:
    - host_layer_flatpak_command.rc == 0
    - "'flathub' in host_layer_user_flatpak_remotes.stdout_lines | default([])"
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Discover system NVIDIA VA-API runtime branches
  ansible.builtin.command:
    argv:
      - flatpak
      - remote-ls
      - --system
      - flathub
      - --runtime
      - --columns=application,branch
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_system_flatpak_runtimes
  when:
    - host_layer_flatpak_command.rc == 0
    - host_layer_system_flatpak.stat.isdir | default(false)
    - "'flathub' in host_layer_system_flatpak_remotes.stdout_lines | default([])"
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Derive required NVIDIA Flatpak runtimes
  ansible.builtin.set_fact:
    host_layer_nvidia_gl_runtimes: >-
      {{
        host_layer_flatpak_gl_drivers.stdout_lines
        | default([])
        | select('match', '^nvidia-')
        | map('regex_replace', '^', 'org.freedesktop.Platform.GL.')
        | map('regex_replace', '$', '//1.4')
        | list
      }}
    host_layer_user_nvidia_vaapi_runtimes: >-
      {{
        host_layer_user_flatpak_runtimes.stdout_lines
        | default([])
        | select('match', '^org[.]freedesktop[.]Platform[.]VAAPI[.]nvidia[ \t]+')
        | map(
            'regex_replace',
            '^org[.]freedesktop[.]Platform[.]VAAPI[.]nvidia[ \t]+',
            'org.freedesktop.Platform.VAAPI.nvidia//'
          )
        | list
      }}
    host_layer_system_nvidia_vaapi_runtimes: >-
      {{
        host_layer_system_flatpak_runtimes.stdout_lines
        | default([])
        | select('match', '^org[.]freedesktop[.]Platform[.]VAAPI[.]nvidia[ \t]+')
        | map(
            'regex_replace',
            '^org[.]freedesktop[.]Platform[.]VAAPI[.]nvidia[ \t]+',
            'org.freedesktop.Platform.VAAPI.nvidia//'
          )
        | list
      }}
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Validate derived NVIDIA Flatpak runtime references
  ansible.builtin.assert:
    that:
      - item is match('^[A-Za-z0-9._-]+//[A-Za-z0-9._-]+$')
    fail_msg: "Derived malformed NVIDIA Flatpak runtime reference: {{ item }}"
  loop: >-
    {{
      (
        host_layer_nvidia_gl_runtimes
        + host_layer_user_nvidia_vaapi_runtimes
        + host_layer_system_nvidia_vaapi_runtimes
      )
      | unique
      | list
    }}
  loop_control:
    label: "{{ item }}"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Install required user NVIDIA Flatpak runtimes exactly
  ansible.builtin.command:
    argv:
      - flatpak
      - install
      - --user
      - --noninteractive
      - flathub
      - "{{ item }}"
    creates: >-
      {{
        dotfiles_data_home ~ '/flatpak/runtime/'
        ~ item.split('//')[0] ~ '/'
        ~ (host_layer_flatpak_architecture.stdout | trim) ~ '/'
        ~ item.split('//')[1] ~ '/active'
      }}
  loop: >-
    {{
      host_layer_nvidia_gl_runtimes
      + host_layer_user_nvidia_vaapi_runtimes
    }}
  loop_control:
    label: "{{ item }}"
  when:
    - "'flathub' in host_layer_user_flatpak_remotes.stdout_lines | default([])"
  tags:
    - host
    - flatpak
    - flatpak-nvidia

- name: Install required system NVIDIA Flatpak runtimes exactly
  ansible.builtin.command:
    argv:
      - flatpak
      - install
      - --system
      - --noninteractive
      - flathub
      - "{{ item }}"
    creates: >-
      {{
        '/var/lib/flatpak/runtime/' ~ item.split('//')[0] ~ '/'
        ~ (host_layer_flatpak_architecture.stdout | trim) ~ '/'
        ~ item.split('//')[1] ~ '/active'
      }}
  loop: >-
    {{
      host_layer_nvidia_gl_runtimes
      + host_layer_system_nvidia_vaapi_runtimes
    }}
  loop_control:
    label: "{{ item }}"
  become: "{{ not ansible_check_mode }}"
  when:
    - host_layer_system_flatpak.stat.isdir | default(false)
    - "'flathub' in host_layer_system_flatpak_remotes.stdout_lines | default([])"
  tags:
    - host
    - flatpak
    - flatpak-nvidia
