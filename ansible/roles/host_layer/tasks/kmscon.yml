---
- name: Check KMSCON executable
  ansible.builtin.stat:
    path: /usr/bin/kmscon
  register: host_layer_kmscon_binary
  tags:
    - host
    - kmscon

- name: Configure KMSCON when installed in the host image
  when: host_layer_kmscon_binary.stat.executable | default(false)
  tags:
    - host
    - kmscon
  block:
    - name: Check KMSCON system prerequisites
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /usr/bin/python3
        - /usr/lib/systemd/system/kmsconvt@.service
      register: host_layer_kmscon_prerequisites

    - name: Check KMSCON terminfo
      ansible.builtin.command:
        argv:
          - infocmp
          - kmscon
      changed_when: false
      check_mode: false
      register: host_layer_kmscon_terminfo

    - name: Require complete KMSCON host support
      ansible.builtin.assert:
        that:
          - >-
            host_layer_kmscon_prerequisites.results
            | map(attribute='stat.exists')
            | select('equalto', false)
            | list
            | length == 0
          - host_layer_kmscon_terminfo.rc == 0
        fail_msg: >-
          KMSCON is installed, but its Python runtime, systemd template, or
          terminfo entry is missing from the host image.

    - name: Create KMSCON configuration directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      become: true
      loop:
        - /etc/default
        - /etc/kmscon
        - /etc/systemd/system
        - /etc/systemd/system/kmsconvt@.service.d
        - /usr/local/libexec/dotfiles
        - /usr/local/share/dotfiles

    - name: Install KMSCON helper programs and palette
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode }}"
      become: true
      loop:
        - src: "{{ dotfiles_ansible_dir }}/files/scripts/host/desktop/kmscon-theme-config.py"
          dest: /usr/local/libexec/dotfiles/kmscon-theme-config
          mode: "0755"
        - src: "{{ dotfiles_ansible_dir }}/files/scripts/host/desktop/kmscon-refresh.py"
          dest: /usr/local/libexec/dotfiles/kmscon-refresh
          mode: "0755"
        - src: "{{ dotfiles_repo_root }}/dotfiles/.chezmoitemplates/catppuccin_palette.json"
          dest: /usr/local/share/dotfiles/catppuccin_palette.json
          mode: "0644"
      loop_control:
        label: "{{ item.dest }}"

    - name: Install editable KMSCON theme defaults
      ansible.builtin.copy:
        dest: /etc/default/kmscon-dotfiles
        mode: "0644"
        force: false
        content: |
          # Sofia center is the default location.
          # DOTFILES_KMSCON_LATITUDE=
          # DOTFILES_KMSCON_LONGITUDE=
          # DOTFILES_KMSCON_THEME=latte
          # DOTFILES_KMSCON_THEME=frappe
      become: true

    - name: Install KMSCON systemd units
      ansible.builtin.copy:
        dest: "{{ item.dest }}"
        mode: "0644"
        content: "{{ item.content }}"
      become: true
      loop:
        - dest: /etc/systemd/system/kmsconvt@.service.d/10-dotfiles-theme.conf
          content: |
            [Service]
            EnvironmentFile=-/etc/default/kmscon-dotfiles
            ExecStartPre=-/usr/bin/python3 /usr/local/libexec/dotfiles/kmscon-theme-config /usr/local/share/dotfiles/catppuccin_palette.json /etc/kmscon/kmscon.conf
        - dest: /etc/systemd/system/kmscon-theme-refresh.service
          content: |
            [Unit]
            Description=Refresh KMSCON theme
            Documentation=https://github.com/kmscon/kmscon

            [Service]
            Type=oneshot
            EnvironmentFile=-/etc/default/kmscon-dotfiles
            ExecStart=-/usr/bin/python3 /usr/local/libexec/dotfiles/kmscon-theme-config /usr/local/share/dotfiles/catppuccin_palette.json /etc/kmscon/kmscon.conf
            ExecStartPost=-/usr/bin/python3 /usr/local/libexec/dotfiles/kmscon-refresh
        - dest: /etc/systemd/system/kmscon-theme-refresh.timer
          content: |
            [Unit]
            Description=Refresh KMSCON theme around day/night changes

            [Timer]
            OnBootSec=2m
            OnCalendar=*-*-* 00,02,04,06,18,20,22:05:00
            Persistent=true

            [Install]
            WantedBy=timers.target
      loop_control:
        label: "{{ item.dest }}"

    - name: Use KMSCON for automatic virtual terminals
      ansible.builtin.file:
        src: /usr/lib/systemd/system/kmsconvt@.service
        dest: /etc/systemd/system/autovt@.service
        state: link
        force: true
      become: true

    - name: Remove the tty1 getty activation link
      ansible.builtin.file:
        path: /etc/systemd/system/getty.target.wants/getty@tty1.service
        state: absent
      become: true

    - name: Activate KMSCON on tty1
      ansible.builtin.file:
        src: /usr/lib/systemd/system/kmsconvt@.service
        dest: /etc/systemd/system/getty.target.wants/kmsconvt@tty1.service
        state: link
        force: true
      become: true

    - name: Enable KMSCON theme refresh timer
      ansible.builtin.systemd_service:
        name: kmscon-theme-refresh.timer
        enabled: true
        state: started
        daemon_reload: true
      become: true

    - name: Render the current KMSCON theme
      ansible.builtin.command:
        argv:
          - systemctl
          - start
          - kmscon-theme-refresh.service
      become: true
      changed_when: false
