---
- name: Gather host service state
  ansible.builtin.service_facts:
  when: ansible_service_mgr == 'systemd'
  tags:
    - host
    - services
    - slow-boot-services

- name: Disable unused slow-boot services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
    scope: system
  become: true
  loop: "{{ host_layer_slow_boot_units }}"
  when:
    - ansible_service_mgr == 'systemd'
    - item in ansible_facts.services
  tags:
    - host
    - services
    - slow-boot-services
