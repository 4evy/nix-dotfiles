---
- name: Create Toshy state and automation directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ host_layer_toshy_root }}"
      mode: "0755"
    - path: "{{ host_layer_toshy_automation_dir }}"
      mode: "0700"
    - path: "{{ dotfiles_config_home }}/systemd/user/toshy-config.service.d"
      mode: "0755"
  tags:
    - host
    - toshy

- name: Check out pinned Toshy source
  ansible.builtin.git:
    repo: "{{ host_layer_toshy_repository }}"
    dest: "{{ host_layer_toshy_source_dir }}"
    version: "{{ host_layer_toshy_revision }}"
    depth: 1
    force: true
  tags:
    - host
    - toshy

- name: Install Toshy sudo automation shim
  ansible.builtin.copy:
    src: "{{ dotfiles_ansible_dir }}/files/scripts/host/keyboard/sudo-shim.py"
    dest: "{{ host_layer_toshy_automation_dir }}/sudo"
    mode: "0755"
  tags:
    - host
    - toshy

- name: Inspect Toshy configuration slices
  ansible.builtin.command:
    argv:
      - grep
      - -F
      - -q
      - "{{ item }}"
      - "{{ host_layer_toshy_config }}"
  changed_when: false
  failed_when: false
  check_mode: false
  loop:
    - "SLICE_MARK_START: keymapper_api"
    - "SLICE_MARK_START: barebones_user_cfg"
  register: host_layer_toshy_config_slices
  tags:
    - host
    - toshy

- name: Detect host sudo for Toshy installer
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - command -v sudo
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_toshy_sudo
  tags:
    - host
    - toshy

- name: Select Toshy installer arguments
  ansible.builtin.set_fact:
    host_layer_toshy_installer_args: >-
      {{
        ['install', '--barebones-config']
        + (
            ['--override-distro', host_layer_toshy_distro_override]
            if host_layer_toshy_distro_override | length > 0
            else (
              ['--override-distro', 'silverblue']
              if common_has_rpm_ostree
              else []
            )
          )
        + (['--skip-native'] if host_layer_toshy_skip_native else [])
        + (['--no-dbus-python'] if host_layer_toshy_no_dbus_python else [])
      }}
  tags:
    - host
    - toshy

- name: Require sudo for Toshy installer
  ansible.builtin.assert:
    that:
      - host_layer_toshy_sudo.rc == 0
      - host_layer_toshy_sudo.stdout | trim | length > 0
    fail_msg: Toshy installation requires sudo on the host.
  when: >-
    host_layer_toshy_run_installer
    or host_layer_toshy_config_slices.results
      | rejectattr('rc', 'equalto', 0)
      | list
      | length > 0
  tags:
    - host
    - toshy

- name: Run upstream Toshy barebones installer
  ansible.builtin.command:
    argv: >-
      {{
        [
          ansible_playbook_python,
          dotfiles_ansible_dir ~ '/files/scripts/host/keyboard/toshy-setup.py',
          host_layer_toshy_source_dir ~ '/setup_toshy.py'
        ] + host_layer_toshy_installer_args
      }}
  environment:
    PATH: >-
      {{
        host_layer_toshy_automation_dir
        ~ ':/run/wrappers/bin:/usr/sbin:/usr/bin:/sbin:/bin:'
        ~ '/usr/local/sbin:/usr/local/bin:' ~ dotfiles_path
      }}
    TOSHY_SUDO: "{{ host_layer_toshy_sudo.stdout | trim }}"
    TOSHY_SUDO_SHIM_DIR: "{{ host_layer_toshy_automation_dir }}"
  changed_when: true
  when:
    - not ansible_check_mode
    - >-
      host_layer_toshy_run_installer
      or host_layer_toshy_config_slices.results
        | rejectattr('rc', 'equalto', 0)
        | list
        | length > 0
  tags:
    - host
    - toshy

- name: Check Toshy configuration after installation
  ansible.builtin.stat:
    path: "{{ host_layer_toshy_config }}"
  register: host_layer_toshy_config_file
  tags:
    - host
    - toshy

- name: Require Toshy configuration
  ansible.builtin.assert:
    that:
      - host_layer_toshy_config_file.stat.exists | default(false)
    fail_msg: >-
      Toshy installer did not create the expected configuration at
      {{ host_layer_toshy_config }}.
  when: not ansible_check_mode
  tags:
    - host
    - toshy

- name: Merge dotfiles slices into Toshy configuration
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - "{{ dotfiles_repo_root }}/packages/toshy/merge-slices.py"
      - "{{ host_layer_toshy_config }}"
      - "{{ host_layer_toshy_slices }}"
      - "{{ host_layer_toshy_merged_config }}"
  changed_when: false
  when:
    - not ansible_check_mode
    - host_layer_toshy_config_file.stat.exists | default(false)
  tags:
    - host
    - toshy

- name: Install merged Toshy configuration
  ansible.builtin.copy:
    src: "{{ host_layer_toshy_merged_config }}"
    dest: "{{ host_layer_toshy_config }}"
    remote_src: true
    mode: "0644"
  notify: Restart Toshy services
  when:
    - not ansible_check_mode
    - host_layer_toshy_config_file.stat.exists | default(false)
  tags:
    - host
    - toshy

- name: Validate merged Toshy configuration syntax
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - -m
      - py_compile
      - "{{ host_layer_toshy_config }}"
  changed_when: false
  when:
    - not ansible_check_mode
    - host_layer_toshy_config_file.stat.exists | default(false)
  tags:
    - host
    - toshy

- name: Install Toshy Kanata user units
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: "{{ dotfiles_ansible_dir }}/files/scripts/host/keyboard/toshy-kanata.conf"
      dest: >-
        {{ dotfiles_config_home }}/systemd/user/toshy-config.service.d/10-dotfiles.conf
    - src: >-
        {{ dotfiles_ansible_dir }}/files/scripts/host/keyboard/toshy-kanata-device.path
      dest: "{{ dotfiles_config_home }}/systemd/user/toshy-kanata-device.path"
    - src: >-
        {{ dotfiles_ansible_dir }}/files/scripts/host/keyboard/toshy-kanata-device.service
      dest: "{{ dotfiles_config_home }}/systemd/user/toshy-kanata-device.service"
  notify: Restart Toshy services
  tags:
    - host
    - toshy

- name: Enable Toshy Kanata device watcher
  ansible.builtin.systemd_service:
    name: toshy-kanata-device.path
    enabled: true
    state: started
    scope: user
    daemon_reload: true
  tags:
    - host
    - toshy

- name: Refresh Toshy for the current Kanata device
  ansible.builtin.systemd_service:
    name: toshy-kanata-device.service
    state: started
    scope: user
  changed_when: false
  failed_when: false
  tags:
    - host
    - toshy

- name: Check Toshy desktop surfaces
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ dotfiles_data_home }}/applications/Toshy_Tray.desktop"
    - "{{ dotfiles_data_home }}/applications/app.toshy.preferences.desktop"
    - "{{ dotfiles_config_home }}/autostart/Toshy_Tray.desktop"
    - "{{ dotfiles_config_home }}/autostart/app.toshy.preferences.desktop"
  register: host_layer_toshy_desktop_surfaces
  tags:
    - host
    - toshy

- name: Hide Toshy desktop surfaces
  ansible.builtin.lineinfile:
    path: "{{ item.item }}"
    regexp: "^[ \\t]*NoDisplay="
    line: NoDisplay=true
    insertafter: EOF
  loop: "{{ host_layer_toshy_desktop_surfaces.results }}"
  loop_control:
    label: "{{ item.item | basename }}"
  when: item.stat.exists
  tags:
    - host
    - toshy

- name: Disable Toshy tray user service
  ansible.builtin.systemd_service:
    name: toshy-tray.service
    enabled: false
    state: stopped
    scope: user
  failed_when: false
  tags:
    - host
    - toshy
