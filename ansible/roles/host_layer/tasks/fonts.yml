---
- name: Check fontconfig cache executable
  ansible.builtin.stat:
    path: /usr/bin/fc-cache
  register: host_layer_fc_cache_binary
  tags:
    - host
    - fonts
    - font-cache

- name: Detect JetBrainsMono Nerd Font Mono
  ansible.builtin.command:
    argv:
      - fc-match
      - --format=%{postscriptname}
      - JetBrainsMono Nerd Font Mono
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_nerd_font_match
  tags:
    - host
    - fonts
    - jetbrains-nerd-font

- name: Install JetBrainsMono Nerd Font Mono
  when: >-
    'JetBrainsMonoNerdFontMono' not in host_layer_nerd_font_match.stdout
  tags:
    - host
    - fonts
    - jetbrains-nerd-font
  block:
    - name: Create user font directory
      ansible.builtin.file:
        path: "{{ host_layer_nerd_font_dir }}"
        state: directory
        mode: "0755"

    - name: Download JetBrainsMono Nerd Font archive
      ansible.builtin.get_url:
        url: "{{ host_layer_nerd_font_archive_url }}"
        dest: "{{ host_layer_nerd_font_archive }}"
        mode: "0644"

    - name: Extract JetBrainsMono Nerd Font Mono files
      ansible.builtin.unarchive:
        src: "{{ host_layer_nerd_font_archive }}"
        dest: "{{ host_layer_nerd_font_dir }}"
        remote_src: true
        include:
          - JetBrainsMonoNerdFontMono-*.ttf
          - JetBrainsMonoNLNerdFontMono-*.ttf
        mode: "0644"
      register: host_layer_nerd_font_extract
      notify:
        - Refresh system font cache
        - Refresh user font cache

    - name: Refresh fontconfig before font verification
      ansible.builtin.meta: flush_handlers

    - name: Verify JetBrainsMono Nerd Font Mono installation
      ansible.builtin.command:
        argv:
          - fc-match
          - --format=%{postscriptname}
          - JetBrainsMono Nerd Font Mono
      changed_when: false
      register: host_layer_nerd_font_verify
      failed_when: >-
        'JetBrainsMonoNerdFontMono' not in host_layer_nerd_font_verify.stdout

- name: Detect writable GNOME font settings
  ansible.builtin.command:
    argv:
      - gsettings
      - writable
      - org.gnome.desktop.interface
      - "{{ item.key }}"
  loop: "{{ host_layer_font_settings }}"
  loop_control:
    label: "{{ item.key }}"
  register: host_layer_writable_font_settings
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - host
    - fonts

- name: Configure writable GNOME font settings
  community.general.dconf:
    key: "{{ item.item.path }}"
    value: "{{ item.item.value }}"
    state: present
  loop: "{{ host_layer_writable_font_settings.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when:
    - item.rc == 0
    - item.stdout | trim == 'true'
  tags:
    - host
    - fonts

- name: Check user fontconfig configuration
  ansible.builtin.stat:
    path: "{{ dotfiles_config_home }}/fontconfig/conf.d"
  register: host_layer_user_fontconfig_directory
  tags:
    - host
    - fonts
    - font-cache

- name: Find user fontconfig fragments
  ansible.builtin.find:
    paths: "{{ dotfiles_config_home }}/fontconfig/conf.d"
    patterns: "*.conf"
    file_type: file
    recurse: false
  register: host_layer_user_fontconfig_files
  when: host_layer_user_fontconfig_directory.stat.isdir | default(false)
  tags:
    - host
    - fonts
    - font-cache

- name: Check Flatpak application data
  ansible.builtin.stat:
    path: "{{ dotfiles_home_dir }}/.var/app"
  register: host_layer_flatpak_app_root
  tags:
    - host
    - fonts
    - font-cache

- name: Find Flatpak application directories
  ansible.builtin.find:
    paths: "{{ dotfiles_home_dir }}/.var/app"
    file_type: directory
    recurse: false
  register: host_layer_flatpak_app_directories
  when: host_layer_flatpak_app_root.stat.isdir | default(false)
  tags:
    - host
    - fonts
    - font-cache

- name: Reconcile Flatpak application font configuration
  ansible.builtin.include_tasks:
    file: flatpak-fonts.yml
    apply:
      tags:
        - host
        - fonts
        - font-cache
  loop: "{{ host_layer_flatpak_app_directories.files | default([]) }}"
  loop_control:
    loop_var: host_layer_flatpak_app
    label: "{{ host_layer_flatpak_app.path | basename }}"
  tags:
    - host
    - fonts
    - font-cache

- name: Find stale user fontconfig caches
  ansible.builtin.find:
    paths: "{{ dotfiles_cache_home }}/fontconfig"
    patterns: "*cache-11"
    file_type: any
    recurse: false
  register: host_layer_stale_user_font_caches
  failed_when: false
  tags:
    - host
    - fonts
    - font-cache

- name: Remove stale user fontconfig caches
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ host_layer_stale_user_font_caches.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  tags:
    - host
    - fonts
    - font-cache
