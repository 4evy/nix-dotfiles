---
- name: Run configured host layer scripts
  ansible.builtin.include_tasks:
    file: run-script.yml
    apply:
      tags: "{{ host_layer_script.tags }}"
  loop: "{{ host_layer_scripts }}"
  loop_control:
    loop_var: host_layer_script
    label: "{{ host_layer_script.name }}"
  tags:
    - host
    - scripts
    - tailscale
    - rustdesk
    - slow-boot-services
