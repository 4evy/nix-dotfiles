---
- name: Create Sushi Flatpak build cache
  ansible.builtin.file:
    path: "{{ host_layer_sushi_cache_root }}"
    state: directory
    mode: "0755"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Check out pinned Sushi source
  ansible.builtin.git:
    repo: "{{ host_layer_sushi_repository }}"
    dest: "{{ host_layer_sushi_source_dir }}"
    version: "{{ host_layer_sushi_revision }}"
    force: true
  register: host_layer_sushi_source
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Check pinned Sushi manifest
  ansible.builtin.stat:
    path: "{{ host_layer_sushi_upstream_manifest }}"
  register: host_layer_sushi_upstream_manifest_file
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Require pinned Sushi manifest
  ansible.builtin.assert:
    that:
      - host_layer_sushi_upstream_manifest_file.stat.exists | default(false)
    fail_msg: >-
      Pinned Sushi source does not contain the expected Flatpak manifest at
      {{ host_layer_sushi_upstream_manifest }}.
  when:
    - host_layer_flatpak_command.rc == 0
    - not (ansible_check_mode and host_layer_sushi_source is changed)
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Read pinned Sushi manifest
  ansible.builtin.slurp:
    src: "{{ host_layer_sushi_upstream_manifest }}"
  register: host_layer_sushi_manifest_source
  when:
    - host_layer_flatpak_command.rc == 0
    - host_layer_sushi_upstream_manifest_file.stat.exists | default(false)
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Initialize pinned Sushi manifest data
  ansible.builtin.set_fact:
    host_layer_sushi_manifest_data: >-
      {{ host_layer_sushi_manifest_source.content | b64decode | from_json }}
    host_layer_sushi_manifest_modules: []
  when: host_layer_sushi_manifest_source is not skipped
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Configure pinned Sushi manifest modules
  ansible.builtin.set_fact:
    host_layer_sushi_manifest_modules: >-
      {{
        host_layer_sushi_manifest_modules
        + [
          item
          | combine(
              {
                'config-opts': (
                  item['config-opts']
                  | default([])
                  | reject('match', '^-Dprofile=')
                  | list
                ) + ['-Dprofile=' ~ host_layer_sushi_profile]
              }
              if item.name | default('') == 'sushi'
              else {}
            )
        ]
      }}
  loop: "{{ host_layer_sushi_manifest_data.modules | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed module') }}"
  when: host_layer_sushi_manifest_source is not skipped
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Render pinned Sushi Flatpak manifest
  ansible.builtin.copy:
    content: >-
      {{
        host_layer_sushi_manifest_data
        | combine({
            'app-id': host_layer_sushi_app_id,
            'modules': host_layer_sushi_manifest_modules
          })
        | to_nice_json(indent=2)
      }}
    dest: "{{ host_layer_sushi_manifest }}"
    mode: "0644"
  register: host_layer_sushi_rendered_manifest
  when: host_layer_sushi_manifest_source is not skipped
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Check installed Sushi Flatpak
  ansible.builtin.command:
    argv:
      - flatpak
      - info
      - --user
      - "{{ host_layer_sushi_app_id }}"
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_sushi_installed
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Build and install pinned Sushi Flatpak
  ansible.builtin.command:
    argv:
      - flatpak
      - run
      - "--filesystem={{ host_layer_sushi_cache_root }}"
      - org.flatpak.Builder
      - --user
      - --install
      - --force-clean
      - "--state-dir={{ host_layer_sushi_builder_state_dir }}"
      - "{{ host_layer_sushi_build_dir }}"
      - "{{ host_layer_sushi_manifest }}"
  changed_when: true
  register: host_layer_sushi_build
  notify:
    - Stop old Sushi Flatpak process
    - Stop Nautilus after Sushi rebuild
  when:
    - not ansible_check_mode
    - host_layer_sushi_manifest_source is not skipped
    - >-
      host_layer_sushi_source is changed
      or host_layer_sushi_rendered_manifest is changed
      or host_layer_sushi_installed.rc != 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Configure Sushi Flatpak graphics environment
  ansible.builtin.command:
    argv:
      - flatpak
      - override
      - --user
      - --env=GDK_GL=gles
      - "{{ host_layer_sushi_app_id }}"
  changed_when: host_layer_sushi_build is changed
  when:
    - not ansible_check_mode
    - host_layer_flatpak_command.rc == 0
    - host_layer_sushi_installed.rc == 0 or host_layer_sushi_build is changed
  tags:
    - host
    - flatpak
    - sushi-preview
