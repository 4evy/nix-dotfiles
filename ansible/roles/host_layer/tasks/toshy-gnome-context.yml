---
- name: Detect GNOME Shell version
  ansible.builtin.command:
    argv:
      - gnome-shell
      - --version
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_gnome_shell_version
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Detect GNOME extension command
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - version
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_gnome_extensions_command
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Select GNOME Shell major version
  ansible.builtin.set_fact:
    host_layer_gnome_shell_major: >-
      {{ host_layer_gnome_shell_version.stdout | regex_search('[0-9]+') | default('') }}
  when:
    - host_layer_gnome_shell_version.rc == 0
    - host_layer_gnome_extensions_command.rc == 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Create GNOME extension cache
  ansible.builtin.file:
    path: "{{ host_layer_toshy_gnome_extension_cache }}"
    state: directory
    mode: "0755"
  when: host_layer_gnome_shell_major | default('') | length > 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Query compatible Toshy GNOME extensions
  ansible.builtin.uri:
    url: >-
      {{
        host_layer_toshy_gnome_extension_origin
        ~ '/extension-info/?uuid=' ~ (item.uuid | urlencode)
        ~ '&shell_version=' ~ (host_layer_gnome_shell_major | urlencode)
      }}
    return_content: true
  check_mode: false
  loop: "{{ host_layer_toshy_gnome_extensions }}"
  loop_control:
    label: "{{ item.label }}"
  register: host_layer_toshy_gnome_metadata
  when: host_layer_gnome_shell_major | default('') | length > 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Collect compatible Toshy GNOME extensions
  ansible.builtin.set_fact:
    host_layer_toshy_compatible_extensions: >-
      {{
        host_layer_toshy_compatible_extensions | default([])
        + [
          item.item
          | combine({
              'download_url': item.json.download_url,
              'version': item.json.version,
              'archive': host_layer_toshy_gnome_extension_cache
                ~ '/' ~ item.item.uuid ~ '-' ~ item.json.version
                ~ '.shell-extension.zip'
            })
        ]
      }}
  loop: "{{ host_layer_toshy_gnome_metadata.results | default([]) }}"
  loop_control:
    label: "{{ item.item.label | default('unknown extension') }}"
  when:
    - item.json.download_url | default('') | length > 0
    - item.json.version is defined
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Require a compatible Toshy window-context extension
  ansible.builtin.assert:
    that:
      - >-
        host_layer_toshy_compatible_extensions
        | default([])
        | selectattr('window_context', 'equalto', true)
        | list
        | length > 0
    fail_msg: >-
      No Toshy-compatible window-context extension is available for GNOME Shell
      {{ host_layer_gnome_shell_major }}.
  when: host_layer_gnome_shell_major | default('') | length > 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Download compatible Toshy GNOME extensions
  ansible.builtin.get_url:
    url: "{{ host_layer_toshy_gnome_extension_origin }}{{ item.download_url }}"
    dest: "{{ item.archive }}"
    mode: "0644"
  loop: "{{ host_layer_toshy_compatible_extensions | default([]) }}"
  loop_control:
    label: "{{ item.label }}"
  when: not ansible_check_mode
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Inspect installed Toshy GNOME extensions
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - info
      - "{{ item.uuid }}"
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ host_layer_toshy_compatible_extensions | default([]) }}"
  loop_control:
    label: "{{ item.label }}"
  register: host_layer_toshy_gnome_info
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Install compatible Toshy GNOME extensions
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - install
      - --force
      - --print-uuid
      - "{{ item.item.archive }}"
  changed_when: true
  failed_when: >-
    host_layer_toshy_gnome_install.rc != 0
    or host_layer_toshy_gnome_install.stdout | trim != item.item.uuid
  loop: "{{ host_layer_toshy_gnome_info.results | default([]) }}"
  loop_control:
    label: "{{ item.item.label }}"
  register: host_layer_toshy_gnome_install
  when:
    - not ansible_check_mode
    - >-
      item.rc != 0
      or item.stdout is not regex(
        '(?m)^  Version: ' ~ (item.item.version | string | regex_escape) ~ '$'
      )
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: List enabled GNOME extensions
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - list
      - --enabled
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_enabled_gnome_extensions
  when: host_layer_gnome_shell_major | default('') | length > 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Enable compatible Toshy GNOME extensions in the active session
  ansible.builtin.command:
    argv:
      - gnome-extensions
      - enable
      - "{{ item.uuid }}"
  changed_when: host_layer_toshy_gnome_enable.rc == 0
  failed_when: false
  loop: "{{ host_layer_toshy_compatible_extensions | default([]) }}"
  loop_control:
    label: "{{ item.label }}"
  register: host_layer_toshy_gnome_enable
  when:
    - not ansible_check_mode
    - >-
      item.uuid not in host_layer_enabled_gnome_extensions.stdout_lines | default([])
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Read persistently enabled GNOME extensions
  community.general.dconf:
    key: /org/gnome/shell/enabled-extensions
    state: read
  register: host_layer_persisted_gnome_extensions
  when: host_layer_gnome_shell_major | default('') | length > 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Merge persistently enabled Toshy GNOME extensions
  ansible.builtin.set_fact:
    host_layer_toshy_enabled_extensions: >-
      {{
        host_layer_toshy_enabled_extensions
        | default(
            host_layer_persisted_gnome_extensions.value
            | default('@as []', true),
            true
          )
        | merge_gvariant_string_list(item.uuid)
      }}
  loop: "{{ host_layer_toshy_compatible_extensions | default([]) }}"
  loop_control:
    label: "{{ item.label }}"
  when: host_layer_persisted_gnome_extensions is not skipped
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Persist enabled Toshy GNOME extensions
  community.general.dconf:
    key: /org/gnome/shell/enabled-extensions
    value: "{{ host_layer_toshy_enabled_extensions }}"
    state: present
  when:
    - host_layer_persisted_gnome_extensions is not skipped
    - host_layer_toshy_enabled_extensions is defined
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Read GNOME overlay key
  community.general.dconf:
    key: /org/gnome/mutter/overlay-key
    state: read
  register: host_layer_gnome_overlay_key
  when: host_layer_gnome_shell_major | default('') | length > 0
  tags:
    - host
    - toshy
    - toshy-gnome-context

- name: Restore empty GNOME overlay key to Super
  community.general.dconf:
    key: /org/gnome/mutter/overlay-key
    value: "'Super_L'"
    state: present
  when:
    - host_layer_gnome_overlay_key is not skipped
    - host_layer_gnome_overlay_key.value | default("''") == "''"
  tags:
    - host
    - toshy
    - toshy-gnome-context
