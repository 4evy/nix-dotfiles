---
- name: Detect Flatpak
  ansible.builtin.command:
    argv:
      - flatpak
      - --version
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_flatpak_command
  tags:
    - host
    - flatpak
    - flatpak-maintenance
    - flatpak-nvidia
    - sushi-preview

- name: Check system Flatpak installation
  ansible.builtin.stat:
    path: /var/lib/flatpak
  register: host_layer_system_flatpak
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - flatpak-maintenance
    - flatpak-nvidia

- name: Detect native Flatpak architecture
  ansible.builtin.command:
    argv:
      - flatpak
      - --default-arch
  changed_when: false
  check_mode: false
  register: host_layer_flatpak_architecture
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - flatpak-nvidia
    - sushi-preview

- name: Configure user Flatpak remotes
  community.general.flatpak_remote:
    name: "{{ item.name }}"
    flatpakrepo_url: "{{ item.url }}"
    method: user
    state: present
  loop: "{{ host_layer_flatpak_remotes }}"
  loop_control:
    label: "{{ item.name }}"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Install user Flatpak build prerequisites
  community.general.flatpak:
    name: "{{ item.name }}"
    remote: "{{ item.remote }}"
    method: user
    state: present
  loop: >-
    {{
      host_layer_flatpak_packages
      | rejectattr('branch', 'defined')
      | list
    }}
  loop_control:
    label: "{{ item.name }}"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Install exact user Flatpak runtime prerequisites
  ansible.builtin.command:
    argv:
      - flatpak
      - install
      - --user
      - --noninteractive
      - "{{ item.remote }}"
      - "{{ item.name }}//{{ item.branch }}"
    creates: >-
      {{
        dotfiles_data_home ~ '/flatpak/runtime/' ~ item.name ~ '/'
        ~ (host_layer_flatpak_architecture.stdout | trim) ~ '/'
        ~ item.branch ~ '/active'
      }}
  loop: >-
    {{
      host_layer_flatpak_packages
      | selectattr('branch', 'defined')
      | list
    }}
  loop_control:
    label: "{{ item.name }}//{{ item.branch }}"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview
