---
- name: Detect Flatpak
  ansible.builtin.command:
    argv:
      - flatpak
      - --version
  changed_when: false
  failed_when: false
  check_mode: false
  register: host_layer_flatpak_command
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Configure user Flatpak remotes
  community.general.flatpak_remote:
    name: "{{ item.name }}"
    flatpakrepo_url: "{{ item.url }}"
    method: user
    state: present
  loop: "{{ host_layer_flatpak_remotes }}"
  loop_control:
    label: "{{ item.name }}"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview

- name: Install user Flatpak build prerequisites
  community.general.flatpak:
    name: "{{ item.name }}"
    remote: "{{ item.remote }}"
    method: user
    state: present
  loop: "{{ host_layer_flatpak_packages }}"
  loop_control:
    label: "{{ item.name }}"
  when: host_layer_flatpak_command.rc == 0
  tags:
    - host
    - flatpak
    - sushi-preview
