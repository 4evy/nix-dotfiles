---
- name: Stop old Sushi Flatpak process
  ansible.builtin.command:
    argv:
      - flatpak
      - kill
      - "{{ host_layer_sushi_app_id }}"
  changed_when: false
  failed_when: false

- name: Stop Nautilus after Sushi rebuild
  ansible.builtin.command:
    argv:
      - nautilus
      - -q
  changed_when: false
  failed_when: false

- name: Restart Toshy services
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - command -v toshy-services-restart >/dev/null && exec toshy-services-restart
  changed_when: true
  failed_when: false

- name: Refresh system font cache
  ansible.builtin.command:
    argv:
      - /usr/bin/fc-cache
      - -f
  become: true
  changed_when: true
  when: host_layer_fc_cache_binary.stat.executable | default(false)

- name: Refresh user font cache
  ansible.builtin.command:
    argv:
      - /usr/bin/fc-cache
      - -f
  changed_when: true
  when: host_layer_fc_cache_binary.stat.executable | default(false)

- name: Reload Kanata udev rules
  ansible.builtin.command:
    argv:
      - udevadm
      - control
      - --reload-rules
  become: true
  changed_when: true
  notify: Trigger Kanata uinput rules

- name: Trigger Kanata uinput rules
  ansible.builtin.command:
    argv:
      - udevadm
      - trigger
      - --subsystem-match=misc
      - --attr-match=name=uinput
  become: true
  changed_when: true
