---
local_tools_go_tools:
  - name: zellij-theme-tools
    packages:
      - ./cmd/zellij-theme-run
    bins:
      - zellij-theme-run
    platforms:
      - Darwin
      - Linux

local_tools_script_tools:
  - name: system-runner
    source: ansible/files/scripts/local/system-runner.sh
    bins:
      - system-runner
    platforms:
      - Darwin
      - Linux
  - name: hyper-window-tiling-build
    source: ansible/files/scripts/local/hyper-window-tiling-build.sh
    bins:
      - hyper-window-tiling-build
    platforms:
      - Darwin
      - Linux
  - name: install-ghidra-mcp
    source: ansible/files/scripts/apps/install-ghidra-mcp.sh
    support_source: ansible/files/scripts/apps/ghidra-mcp
    support_name: ghidra-mcp
    bins:
      - install-ghidra-mcp
    platforms:
      - Darwin
      - Linux

local_tools_upstream_script_tools:
  - name: yt-dlp-script
    url: https://raw.githubusercontent.com/euvlok/pkgs/HEAD/pkgs/by-name/yt/yt-dlp-script/yt-dlp-script.sh
    dest: "{{ dotfiles_bin_dir }}/yt-dlp-script"
    platforms:
      - Darwin
      - Linux
