---
- name: Build repo-local Go commands
  ansible.builtin.command:
    argv: "{{ ['go', 'install', '-trimpath'] + item.packages }}"
    chdir: "{{ dotfiles_repo_root }}"
  environment:
    GOBIN: "{{ dotfiles_bin_dir }}"
    PATH: "{{ prerequisites_homebrew_path | default(dotfiles_path) }}"
  changed_when: true
  loop: "{{ local_tools_go_tools }}"
  loop_control:
    label: "{{ item.name }}"
  when: common_system in item.platforms
  tags:
    - local
    - go
