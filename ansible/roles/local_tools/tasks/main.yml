---
- name: Build repo-local Go commands
  ansible.builtin.import_tasks: go-tools.yml
  tags:
    - local
    - go

- name: Link uv-installed Python command aliases
  ansible.builtin.import_tasks: scripts.yml
  tags:
    - local
    - scripts

- name: Install upstream script commands
  ansible.builtin.import_tasks: upstream-scripts.yml
  tags:
    - local
    - scripts
    - upstream

- name: Verify repo-local commands
  ansible.builtin.import_tasks: verify.yml
  tags:
    - local
    - verify
