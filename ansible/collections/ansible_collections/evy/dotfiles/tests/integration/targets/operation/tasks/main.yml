---
- name: Create operation integration-test directory
  ansible.builtin.tempfile:
    state: directory
    prefix: evy-dotfiles-operation-
  register: operation_test_directory

- name: Exercise operation adapter
  block:
    - name: Install fake dotfiles protocol executable
      ansible.builtin.copy:
        src: fake-dotfiles-scripts
        dest: "{{ operation_test_directory.path }}/dotfiles-scripts"
        mode: "0755"

    - name: Run fake operation in check mode
      evy.dotfiles.operation:
        executable: "{{ operation_test_directory.path }}/dotfiles-scripts"
        command: [host, test]
        context:
          repo_root: "{{ operation_test_directory.path }}"
          home: "{{ operation_test_directory.path }}/home"
        chdir: "{{ operation_test_directory.path }}"
      check_mode: true
      diff: true
      register: operation_check

    - name: Verify native check-mode result
      ansible.builtin.assert:
        that:
          - operation_check is changed
          - operation_check.msg == 'fake check'
          - operation_check.data.command == ['host', 'test']
          - operation_check.diff.before == 'old'
          - operation_check.diff.after == 'new'

    - name: Run fake operation normally
      evy.dotfiles.operation:
        executable: "{{ operation_test_directory.path }}/dotfiles-scripts"
        command: [host, test]
        context:
          repo_root: "{{ operation_test_directory.path }}"
          home: "{{ operation_test_directory.path }}/home"
        chdir: "{{ operation_test_directory.path }}"
      register: operation_apply

    - name: Verify native idempotent result
      ansible.builtin.assert:
        that:
          - operation_apply is not changed
          - operation_apply.msg == 'fake apply'
          - operation_apply.data.home == operation_test_directory.path + '/home'
  always:
    - name: Remove operation integration-test directory
      ansible.builtin.file:
        path: "{{ operation_test_directory.path }}"
        state: absent
