version: 2

project_name: nix-dotfiles

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/...
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: platform-binaries
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "0.0.0-next.{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
