version: "2"

run:
  timeout: 30m
  tests: true
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - modernize
    - nilerr
    - usestdlibvars

formatters:
  enable:
    - gofumpt
